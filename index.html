<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ระบบสารบบคดีเชิงพื้นที่ - สบอ.13 ลำปาง</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght=300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
    .nav-active { border-bottom: 4px solid #059669; color: #059669; }
    .tab-wildlife.nav-active { border-bottom: 4px solid #7c3aed; color: #7c3aed; }

    /* UTM box style */
    .utm-box {
      background: linear-gradient(135deg, #f0fdf4 0%, #eff6ff 100%);
      border: 1.5px solid #6ee7b7;
      border-radius: 12px;
      padding: 12px;
    }
    .utm-box.violet {
      background: linear-gradient(135deg, #faf5ff 0%, #eff6ff 100%);
      border-color: #c4b5fd;
    }
    .utm-result-badge {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #6ee7b7;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.72rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .utm-result-badge.error {
      background: #fee2e2;
      color: #991b1b;
      border-color: #fca5a5;
    }
    /* พิกัดใน popup */
    .coord-cell { font-size: 0.7rem; color: #475569; white-space: nowrap; }
    .utm-tag { background:#dbeafe; color:#1e40af; border-radius:4px; padding:1px 5px; font-size:0.68rem; font-weight:700; }
    .wgs-tag { background:#d1fae5; color:#065f46; border-radius:4px; padding:1px 5px; font-size:0.68rem; font-weight:700; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <nav class="bg-gradient-to-r from-emerald-800 to-slate-900 text-white shadow-md px-6 py-3 flex justify-between items-center">
    <div class="flex items-center space-x-3">
      <div class="bg-white p-1 rounded-full shadow-sm flex items-center justify-center w-12 h-12 overflow-hidden">
        <img src="https://upload.wikimedia.org/wikipedia/th/7/7d/%E0%B8%95%E0%B8%A3%E0%B8%B2%E0%B8%81%E0%B8%A3%E0%B8%A1%E0%B8%AD%E0%B8%B8%E0%B8%97%E0%B8%A2%E0%B8%B2%E0%B8%99%E0%B9%81%E0%B8%AB%E0%B9%88%E0%B8%87%E0%B8%8A%E0%B8%B2%E0%B8%95%E0%B8%B4_%E0%B8%AA%E0%B8%B1%E0%B8%95%E0%B8%A7%E0%B9%8C%E0%B8%9B%E0%B9%88%E0%B8%B2_%E0%B9%81%E0%B8%A5%E0%B8%B0%E0%B8%9E%E0%B8%B1%E0%B8%99%E0%B8%98%E0%B8%B8%E0%B9%8C%E0%B8%9E%E0%B8%B7%E0%B8%8A.png">
      </div>
      <div>
        <h1 class="text-xl font-bold leading-none tracking-wide">DNP ระบบสารบบคดีเชิงพื้นที่</h1>
        <p class="text-xs opacity-75 mt-1">สำนักบริหารพื้นที่อนุรักษ์ที่ 13 สาขาลำปาง</p>
      </div>
    </div>
    <span class="text-sm font-semibold italic hidden md:block text-emerald-100">Department of National Parks, Wildlife and Plant Conservation</span>
  </nav>

  <main class="max-w-7xl mx-auto p-4 md:p-8 w-full flex-1 flex flex-col">
    <div class="flex space-x-6 mb-6 bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
      <button onclick="switchTab('encroachment')" id="tab-enc" class="pb-2 font-bold text-lg nav-active">
        <i class="fa-solid fa-person-trespassing mr-2"></i> คดีบุกรุกพื้นที่ป่า
      </button>
      <button onclick="switchTab('timber')" id="tab-timber" class="pb-2 font-bold text-lg text-gray-400 hover:text-emerald-600">
        <i class="fa-solid fa-cubes-wood mr-2"></i> คดีไม้ผิดกฎหมาย
      </button>
      <button onclick="switchTab('wildlife')" id="tab-wildlife" class="pb-2 font-bold text-lg text-gray-400 hover:text-violet-600 tab-wildlife">
        <i class="fa-solid fa-paw mr-2"></i> คดีสัตว์ป่า
      </button>
    </div>

    <div class="bg-white rounded-2xl shadow-md overflow-hidden border border-gray-200 h-[450px] mb-6" id="map"></div>

    <div class="flex flex-col md:flex-row justify-between mb-6 gap-4">
      <button onclick="openFormModal()" id="addCaseBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-6 py-3 rounded-xl shadow-md transition flex items-center">
        <i class="fa-solid fa-cloud-arrow-up mr-2 text-lg"></i> บันทึกคดีใหม่ด้วย Shapefile (.zip)
      </button>
      <div class="relative">
        <input type="text" id="tableSearchInput" onkeyup="filterDataGrid()" placeholder="ค้นหาข้อมูลในสารบบ..." class="pl-10 pr-4 py-3 border border-gray-300 rounded-xl outline-none w-full md:w-96 shadow-sm focus:ring-2 focus:ring-emerald-500">
        <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-4 text-gray-400"></i>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-200">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse" id="dataGrid">
          <thead class="bg-gray-50 border-b border-gray-200"><tr id="table-header-row" class="text-emerald-900 text-sm font-bold"></tr></thead>
          <tbody id="table-body-row" class="text-gray-700 text-sm divide-y divide-gray-100">
            <tr><td class="p-12 text-center text-gray-400"><i class="fa-solid fa-circle-notch fa-spin text-2xl text-emerald-600 mr-2"></i> กำลังเชื่อมต่อฐานข้อมูล Supabase...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- ===================== MODAL: คดีบุกรุก + คดีไม้ ===================== -->
  <div id="formModal" style="z-index: 9999;" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden justify-center items-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6">
      <div class="flex justify-between items-center border-b pb-3 mb-4">
        <h3 class="text-lg font-bold text-gray-800" id="modalTitle">นำเข้าข้อมูลคดี</h3>
        <button onclick="closeFormModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button>
      </div>
      
      <form id="unifiedForm" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-xs font-bold text-gray-600 mb-1">เลขคดีที่</label><input type="text" id="caseNo" required placeholder="เช่น 14/2569" class="w-full border p-2.5 rounded-lg outline-none"></div>
          <div><label class="block text-xs font-bold text-gray-600 mb-1">วัน/เดือน/ปี เกิดเหตุ</label><input type="text" id="caseDate" placeholder="เช่น 04/06/2569" required class="w-full border p-2.5 rounded-lg outline-none"></div>
        </div>
        <div><label class="block text-xs font-bold text-gray-600 mb-1">สถานที่เกิดเหตุ</label><input type="text" id="location" required placeholder="ระบุตําบล อำเภอ และชื่อป่าป่าสงวน/ป่าอนุรักษ์" class="w-full border p-2.5 rounded-lg outline-none"></div>
        
        <div id="timberFieldsSection" class="hidden space-y-4 bg-amber-50/50 p-3 rounded-xl border border-amber-200">
          <div class="grid grid-cols-2 gap-2">
            <div><label class="text-xs font-bold text-gray-600">ชนิดไม้</label><input type="text" id="timberType" class="w-full border p-2 rounded-lg bg-white"></div>
            <div class="grid grid-cols-3 gap-1">
              <div><label class="text-xs text-gray-500">กว้าง</label><input type="text" id="width" value="-" class="w-full border p-1 rounded-md text-center bg-white"></div>
              <div><label class="text-xs text-gray-500">ยาว</label><input type="text" id="length" value="-" class="w-full border p-1 rounded-md text-center bg-white"></div>
              <div><label class="text-xs text-gray-500">โต</label><input type="text" id="size" value="-" class="w-full border p-1 rounded-md text-center bg-white"></div>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-2">
            <div><label class="text-xs font-bold text-gray-600">ปริมาตรไม้ท่อน (ลบ.ม.)</label><input type="text" id="vol1" value="0" class="w-full border p-2 rounded-lg bg-white"></div>
            <div><label class="text-xs font-bold text-gray-600">ปริมาตรไม้แปรรูป (ลบ.ม)</label><input type="text" id="vol2" value="0" class="w-full border p-2 rounded-lg bg-white"></div>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-xs font-bold text-gray-600 mb-1">ผลการดำเนินคดี</label><select id="status" class="w-full border p-2.5 rounded-lg bg-white outline-none"><option>อยู่ระหว่างคดี</option><option>คดีสิ้นสุด</option></select></div>
          <div><label class="block text-xs font-bold text-gray-600 mb-1">หน่วยงานที่ดำเนินการ</label><input type="text" id="agency" required placeholder="เช่น สปป.3 (ภาคเหนือ)" class="w-full border p-2.5 rounded-lg outline-none"></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-gray-600 mb-1">จำนวนผู้ต้องหา (ราย)</label>
            <input type="number" id="suspectsCount" min="0" value="0" required class="w-full border p-2.5 rounded-lg outline-none">
          </div>
          <div id="areaFieldsSection">
            <label class="block text-xs font-bold text-gray-600 mb-1">พื้นที่บุกรุก (ไร่-งาน-ตร.ว.)</label>
            <div class="grid grid-cols-3 gap-1">
              <input type="number" id="rai" value="0" min="0" placeholder="ไร่" class="border p-2 rounded-lg text-center text-sm outline-none">
              <input type="number" id="ngarn" value="0" min="0" max="3" placeholder="งาน" class="border p-2 rounded-lg text-center text-sm outline-none">
              <input type="number" id="wa" value="0" min="0" max="99" placeholder="ตร.ว." class="border p-2 rounded-lg text-center text-sm outline-none">
            </div>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">สถานะคดี (ความคืบหน้าขั้นตอนดำเนินคดี)</label>
          <textarea id="caseStatus" rows="3" required placeholder="รายละเอียดความคืบหน้าคดี..." class="w-full border p-2.5 rounded-lg outline-none text-sm"></textarea>
        </div>

        <!-- ✅ UTM INPUT BLOCK (encroachment + timber) -->
        <div class="utm-box">
          <div class="flex items-center justify-between mb-2">
            <label class="text-xs font-bold text-emerald-800"><i class="fa-solid fa-crosshairs mr-1"></i> พิกัดจุดเกิดเหตุ UTM (Zone 47N / WGS84)</label>
            <button type="button" onclick="convertUTM('main')" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs px-3 py-1.5 rounded-lg font-semibold transition">
              <i class="fa-solid fa-rotate mr-1"></i> แปลงพิกัด
            </button>
          </div>
          <div class="grid grid-cols-3 gap-2 mb-2">
            <div>
              <label class="text-xs text-gray-500 block mb-1">Zone (โซน)</label>
              <select id="utm_zone" class="w-full border p-2 rounded-lg bg-white text-sm outline-none">
                <option value="47">47N (ไทยตอนบน)</option>
                <option value="48">48N (ไทยตอนล่าง)</option>
              </select>
            </div>
            <div>
              <label class="text-xs text-gray-500 block mb-1">Easting (X) เมตร</label>
              <input type="number" id="utm_e" placeholder="เช่น 534500" oninput="liveConvertUTM('main')" class="w-full border p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-emerald-400">
            </div>
            <div>
              <label class="text-xs text-gray-500 block mb-1">Northing (Y) เมตร</label>
              <input type="number" id="utm_n" placeholder="เช่น 2023000" oninput="liveConvertUTM('main')" class="w-full border p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-emerald-400">
            </div>
          </div>
          <div id="utm_result_main" class="hidden">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="utm-result-badge" id="utm_result_main_text"></span>
              <button type="button" onclick="previewUTMOnMap('main')" class="text-xs bg-blue-100 text-blue-700 hover:bg-blue-200 px-3 py-1 rounded-lg font-semibold">
                <i class="fa-solid fa-map-pin mr-1"></i> ปักหมุดบนแผนที่
              </button>
            </div>
          </div>
          <div id="utm_error_main" class="hidden utm-result-badge error text-xs mt-1"></div>
          <!-- hidden fields รับค่า lat/lon หลังแปลง -->
          <input type="hidden" id="converted_lat" value="">
          <input type="hidden" id="converted_lon" value="">
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">อัปโหลดไฟล์เอกสาร PDF (ถ้ามี)</label>
          <input type="file" id="pdfFile" accept=".pdf" class="w-full border p-2 rounded-lg bg-slate-50 outline-none text-sm">
        </div>

        <div class="border-2 border-dashed border-emerald-300 bg-emerald-50/10 rounded-xl p-4 text-center relative group">
          <input type="file" id="shpZipFile" accept=".zip" required onchange="displaySelectedFilename()" class="absolute inset-0 opacity-0 cursor-pointer">
          <i class="fa-solid fa-file-zipper text-3xl text-emerald-600 mb-1"></i>
          <p class="text-sm font-bold text-gray-700" id="zipLabelText">เลือกไฟล์บีบอัดของ Shapefile (.zip)</p>
          <p class="text-xs text-amber-600 mt-1 font-semibold hidden" id="filenameDisplay"></p>
        </div>

        <div class="flex justify-end space-x-2 pt-4 border-t">
          <button type="button" onclick="closeFormModal()" class="px-4 py-2.5 border rounded-lg text-gray-500 hover:bg-gray-50">ยกเลิก</button>
          <button type="submit" id="submitBtn" class="px-5 py-2.5 bg-emerald-600 text-white rounded-lg font-semibold shadow-md hover:bg-emerald-700">ส่งประมวลผลขึ้นคลาวด์</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===================== MODAL: คดีสัตว์ป่า ===================== -->
  <div id="wildlifeModal" style="z-index: 9999;" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden justify-center items-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6">
      <div class="flex justify-between items-center border-b pb-3 mb-4">
        <h3 class="text-lg font-bold text-violet-800">
          <i class="fa-solid fa-paw mr-2"></i> บันทึกคดีสัตว์ป่า
        </h3>
        <button onclick="closeWildlifeModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button>
      </div>

      <form id="wildlifeForm" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-xs font-bold text-gray-600 mb-1">เลขคดีที่</label><input type="text" id="wl_caseNo" required placeholder="เช่น 5/2569" class="w-full border p-2.5 rounded-lg outline-none"></div>
          <div><label class="block text-xs font-bold text-gray-600 mb-1">วัน/เดือน/ปี เกิดเหตุ</label><input type="text" id="wl_caseDate" required placeholder="เช่น 04/06/2569" class="w-full border p-2.5 rounded-lg outline-none"></div>
        </div>
        <div><label class="block text-xs font-bold text-gray-600 mb-1">สถานที่เกิดเหตุ</label><input type="text" id="wl_location" required placeholder="ระบุตําบล อำเภอ และชื่อป่าสงวน/ป่าอนุรักษ์" class="w-full border p-2.5 rounded-lg outline-none"></div>

        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-xs font-bold text-gray-600 mb-1">ชนิดของสัตว์ป่า</label><input type="text" id="wl_wildlifeType" placeholder="เช่น เสือดาว, หมูป่า, นกแก้ว" class="w-full border p-2.5 rounded-lg outline-none"></div>
          <div><label class="block text-xs font-bold text-gray-600 mb-1">อุปกรณ์ในการกระทำผิด</label><input type="text" id="wl_equipment" placeholder="เช่น กับดัก, ปืน, ข่าย" class="w-full border p-2.5 rounded-lg outline-none"></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-xs font-bold text-gray-600 mb-1">ผลการดำเนินคดี</label><select id="wl_status" class="w-full border p-2.5 rounded-lg bg-white outline-none"><option>อยู่ระหว่างคดี</option><option>คดีสิ้นสุด</option></select></div>
          <div><label class="block text-xs font-bold text-gray-600 mb-1">จำนวนผู้ต้องหา (ราย)</label><input type="number" id="wl_suspectsCount" min="0" value="0" required class="w-full border p-2.5 rounded-lg outline-none"></div>
        </div>

        <div><label class="block text-xs font-bold text-gray-600 mb-1">หน่วยงานที่ดำเนินการ</label><input type="text" id="wl_agency" required placeholder="เช่น สปป.3 (ภาคเหนือ)" class="w-full border p-2.5 rounded-lg outline-none"></div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">สถานะคดี (ความคืบหน้าขั้นตอนดำเนินคดี)</label>
          <textarea id="wl_caseStatus" rows="3" required placeholder="รายละเอียดความคืบหน้าคดี..." class="w-full border p-2.5 rounded-lg outline-none text-sm"></textarea>
        </div>

        <!-- ✅ UTM INPUT BLOCK (wildlife) -->
        <div class="utm-box violet">
          <div class="flex items-center justify-between mb-2">
            <label class="text-xs font-bold text-violet-800"><i class="fa-solid fa-crosshairs mr-1"></i> พิกัดจุดเกิดเหตุ UTM (Zone 47N / WGS84)</label>
            <button type="button" onclick="convertUTM('wl')" class="bg-violet-600 hover:bg-violet-700 text-white text-xs px-3 py-1.5 rounded-lg font-semibold transition">
              <i class="fa-solid fa-rotate mr-1"></i> แปลงพิกัด
            </button>
          </div>
          <div class="grid grid-cols-3 gap-2 mb-2">
            <div>
              <label class="text-xs text-gray-500 block mb-1">Zone (โซน)</label>
              <select id="wl_utm_zone" class="w-full border p-2 rounded-lg bg-white text-sm outline-none">
                <option value="47">47N (ไทยตอนบน)</option>
                <option value="48">48N (ไทยตอนล่าง)</option>
              </select>
            </div>
            <div>
              <label class="text-xs text-gray-500 block mb-1">Easting (X) เมตร</label>
              <input type="number" id="wl_utm_e" placeholder="เช่น 534500" oninput="liveConvertUTM('wl')" class="w-full border p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-violet-400">
            </div>
            <div>
              <label class="text-xs text-gray-500 block mb-1">Northing (Y) เมตร</label>
              <input type="number" id="wl_utm_n" placeholder="เช่น 2023000" oninput="liveConvertUTM('wl')" class="w-full border p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-violet-400">
            </div>
          </div>
          <!-- OR: กรอก WGS84 โดยตรง -->
          <div class="border-t border-violet-200 mt-2 pt-2">
            <p class="text-xs text-gray-400 mb-1.5">หรือกรอก WGS84 (Lat/Lon) โดยตรง :</p>
            <div class="grid grid-cols-2 gap-2">
              <div><label class="text-xs text-gray-500">Latitude (ละติจูด)</label><input type="number" step="any" id="wl_lat" placeholder="เช่น 18.2897" class="w-full border p-2 rounded-lg outline-none text-sm"></div>
              <div><label class="text-xs text-gray-500">Longitude (ลองจิจูด)</label><input type="number" step="any" id="wl_lon" placeholder="เช่น 99.5021" class="w-full border p-2 rounded-lg outline-none text-sm"></div>
            </div>
          </div>
          <div id="utm_result_wl" class="hidden mt-2">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="utm-result-badge" style="background:#ede9fe;color:#5b21b6;border-color:#c4b5fd;" id="utm_result_wl_text"></span>
              <button type="button" onclick="previewUTMOnMap('wl')" class="text-xs bg-violet-100 text-violet-700 hover:bg-violet-200 px-3 py-1 rounded-lg font-semibold">
                <i class="fa-solid fa-map-pin mr-1"></i> ปักหมุดบนแผนที่
              </button>
            </div>
          </div>
          <div id="utm_error_wl" class="hidden utm-result-badge error text-xs mt-1"></div>
          <input type="hidden" id="wl_converted_lat" value="">
          <input type="hidden" id="wl_converted_lon" value="">
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">อัปโหลดไฟล์เอกสาร PDF (ถ้ามี)</label>
          <input type="file" id="wl_pdfFile" accept=".pdf" class="w-full border p-2 rounded-lg bg-slate-50 outline-none text-sm">
        </div>

        <div class="flex justify-end space-x-2 pt-4 border-t">
          <button type="button" onclick="closeWildlifeModal()" class="px-4 py-2.5 border rounded-lg text-gray-500 hover:bg-gray-50">ยกเลิก</button>
          <button type="submit" id="wl_submitBtn" class="px-5 py-2.5 bg-violet-600 text-white rounded-lg font-semibold shadow-md hover:bg-violet-700">
            <i class="fa-solid fa-floppy-disk mr-1"></i> บันทึกคดีสัตว์ป่า
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // ============================================================
    //  UTM → WGS84 CONVERTER  (pure JS, no external lib)
    //  อ้างอิง: Karney algorithm, WGS84 ellipsoid
    // ============================================================
    function utmToLatLon(easting, northing, zone, isSouthern = false) {
      const a = 6378137.0;
      const f = 1 / 298.257223563;
      const b = a * (1 - f);
      const e2 = 2 * f - f * f;
      const e = Math.sqrt(e2);
      const k0 = 0.9996;
      const E0 = 500000;
      const N0 = isSouthern ? 10000000 : 0;

      const x = easting - E0;
      const y = northing - N0;

      const M = y / k0;
      const mu = M / (a * (1 - e2/4 - 3*e2*e2/64 - 5*e2*e2*e2/256));

      const e1 = (1 - Math.sqrt(1 - e2)) / (1 + Math.sqrt(1 - e2));
      const phi1 = mu
        + (3*e1/2 - 27*e1*e1*e1/32) * Math.sin(2*mu)
        + (21*e1*e1/16 - 55*e1*e1*e1*e1/32) * Math.sin(4*mu)
        + (151*e1*e1*e1/96) * Math.sin(6*mu)
        + (1097*e1*e1*e1*e1/512) * Math.sin(8*mu);

      const sinPhi1 = Math.sin(phi1);
      const cosPhi1 = Math.cos(phi1);
      const tanPhi1 = sinPhi1 / cosPhi1;

      const N1 = a / Math.sqrt(1 - e2 * sinPhi1 * sinPhi1);
      const T1 = tanPhi1 * tanPhi1;
      const C1 = e2 * cosPhi1 * cosPhi1 / (1 - e2);
      const R1 = a * (1 - e2) / Math.pow(1 - e2 * sinPhi1 * sinPhi1, 1.5);
      const D = x / (N1 * k0);

      const lat = phi1 - (N1 * tanPhi1 / R1) * (
        D*D/2
        - (5 + 3*T1 + 10*C1 - 4*C1*C1 - 9*e2*cosPhi1*cosPhi1/(1-e2)) * D*D*D*D/24
        + (61 + 90*T1 + 298*C1 + 45*T1*T1 - 252*e2*cosPhi1*cosPhi1/(1-e2) - 3*C1*C1) * D*D*D*D*D*D/720
      );

      const lon0 = (zone - 1) * 6 - 180 + 3;
      const lon = (lon0 * Math.PI/180) + (
        D
        - (1 + 2*T1 + C1) * D*D*D/6
        + (5 - 2*C1 + 28*T1 - 3*C1*C1 + 8*e2*cosPhi1*cosPhi1/(1-e2) + 24*T1*T1) * D*D*D*D*D/120
      ) / cosPhi1;

      return {
        lat: lat * 180 / Math.PI,
        lon: lon * 180 / Math.PI
      };
    }

    // prefix = 'main' | 'wl'
    function getUTMFields(prefix) {
      if (prefix === 'main') {
        return {
          zone: parseInt(document.getElementById('utm_zone').value),
          e: parseFloat(document.getElementById('utm_e').value),
          n: parseFloat(document.getElementById('utm_n').value),
          resultDiv: 'utm_result_main',
          resultText: 'utm_result_main_text',
          errorDiv: 'utm_error_main',
          latField: 'converted_lat',
          lonField: 'converted_lon'
        };
      } else {
        return {
          zone: parseInt(document.getElementById('wl_utm_zone').value),
          e: parseFloat(document.getElementById('wl_utm_e').value),
          n: parseFloat(document.getElementById('wl_utm_n').value),
          resultDiv: 'utm_result_wl',
          resultText: 'utm_result_wl_text',
          errorDiv: 'utm_error_wl',
          latField: 'wl_converted_lat',
          lonField: 'wl_converted_lon'
        };
      }
    }

    function convertUTM(prefix) {
      const f = getUTMFields(prefix);
      const rDiv = document.getElementById(f.resultDiv);
      const eDiv = document.getElementById(f.errorDiv);
      rDiv.classList.add('hidden');
      eDiv.classList.add('hidden');

      if (!f.e || !f.n || isNaN(f.e) || isNaN(f.n)) {
        eDiv.textContent = '⚠ กรุณากรอก Easting และ Northing ให้ครบ';
        eDiv.classList.remove('hidden');
        return null;
      }
      if (f.e < 100000 || f.e > 900000) {
        eDiv.textContent = '⚠ Easting ควรอยู่ระหว่าง 100,000 – 900,000 เมตร';
        eDiv.classList.remove('hidden');
        return null;
      }
      if (f.n < 0 || f.n > 10000000) {
        eDiv.textContent = '⚠ Northing ควรอยู่ระหว่าง 0 – 10,000,000 เมตร';
        eDiv.classList.remove('hidden');
        return null;
      }

      try {
        const result = utmToLatLon(f.e, f.n, f.zone, false);
        const latStr = result.lat.toFixed(6);
        const lonStr = result.lon.toFixed(6);

        document.getElementById(f.latField).value = latStr;
        document.getElementById(f.lonField).value = lonStr;

        // ถ้าเป็น wl ให้ fill WGS84 field ด้วย
        if (prefix === 'wl') {
          document.getElementById('wl_lat').value = latStr;
          document.getElementById('wl_lon').value = lonStr;
        }

        document.getElementById(f.resultText).innerHTML =
          `<i class="fa-solid fa-check-circle"></i> Zone ${f.zone}N → Lat: <b>${latStr}</b> | Lon: <b>${lonStr}</b>`;
        rDiv.classList.remove('hidden');
        return result;
      } catch(err) {
        eDiv.textContent = '⚠ ไม่สามารถแปลงพิกัดได้: ' + err.message;
        eDiv.classList.remove('hidden');
        return null;
      }
    }

    // แปลงแบบ live ขณะพิมพ์ (debounce)
    let _utmDebounce = {};
    function liveConvertUTM(prefix) {
      clearTimeout(_utmDebounce[prefix]);
      _utmDebounce[prefix] = setTimeout(() => {
        const f = getUTMFields(prefix);
        if (f.e && f.n && !isNaN(f.e) && !isNaN(f.n) && f.e > 100000 && f.n > 0) {
          convertUTM(prefix);
        }
      }, 600);
    }

    function previewUTMOnMap(prefix) {
      const f = getUTMFields(prefix);
      const lat = parseFloat(document.getElementById(f.latField).value);
      const lon = parseFloat(document.getElementById(f.lonField).value);
      if (!lat || !lon) { convertUTM(prefix); return; }

      if (previewMarker) { mapInstance.removeLayer(previewMarker); }
      previewMarker = L.marker([lat, lon]).addTo(mapInstance)
        .bindPopup(`<b class="text-blue-700">📍 พิกัด UTM Zone ${f.zone}N</b><br><span class="text-xs">E: ${document.getElementById(prefix === 'main' ? 'utm_e' : 'wl_utm_e').value}<br>N: ${document.getElementById(prefix === 'main' ? 'utm_n' : 'wl_utm_n').value}<br>→ Lat: ${lat.toFixed(5)}, Lon: ${lon.toFixed(5)}</span>`)
        .openPopup();

      document.getElementById('map').scrollIntoView({ behavior: 'smooth', block: 'center' });
      mapInstance.setView([lat, lon], 14);
    }

    // format UTM display สำหรับตาราง
    function fmtCoords(item) {
      // item มี coords (lat/lon WGS84) และ utm_e/utm_n/utm_zone ถ้ามี
      let parts = [];
      if (item.utm_e && item.utm_n) {
        parts.push(`<span class="utm-tag">UTM Z${item.utm_zone||47}N</span> E:${item.utm_e} N:${item.utm_n}`);
      }
      if (item.coords && item.coords[0]) {
        parts.push(`<span class="wgs-tag">WGS84</span> ${parseFloat(item.coords[0]).toFixed(5)}, ${parseFloat(item.coords[1]).toFixed(5)}`);
      }
      return parts.length ? `<div class="coord-cell">${parts.join('<br>')}</div>` : '-';
    }

    // ============================================================
    //  MAP SETUP
    // ============================================================
    let currentActiveTab = 'encroachment';
    let mapInstance;
    let previewMarker = null;

    let encroachmentLayerGroup = L.layerGroup();
    let timberLayerGroup = L.layerGroup();
    let wildlifeLayerGroup = L.layerGroup();
    let conservationForestLayer = L.layerGroup();
    let reserveForestLayer = L.layerGroup();

    let layerControlInstance = null;
    window.mapLayersRegistry = {};
    const API_BASE_URL = "https://dnp-lampang-api-2.onrender.com";

    const URL_CONSERVATION_FOREST = "https://pihngogrcxxeqyvulnwl.supabase.co/storage/v1/object/public/dnp-shapefiles/conservation_forest.geojson";
    const URL_RESERVE_FOREST = "https://pihngogrcxxeqyvulnwl.supabase.co/storage/v1/object/public/dnp-shapefiles/reserve_forest.geojson";

    function setupMap() {
      mapInstance = L.map('map').setView([18.29, 99.50], 9);
      let openStreetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(mapInstance);

      encroachmentLayerGroup.addTo(mapInstance);
      timberLayerGroup.addTo(mapInstance);
      wildlifeLayerGroup.addTo(mapInstance);
      conservationForestLayer.addTo(mapInstance);
      reserveForestLayer.addTo(mapInstance);

      let baseMaps = { "แผนที่ภูมิประเทศ (OSM)": openStreetMap };
      let overlayMaps = {
        "<span style='color:#ef4444;font-weight:bold;'><i class='fa-solid fa-person-trespassing mr-1'></i> แปลงคดีบุกรุกพื้นที่ป่า</span>": encroachmentLayerGroup,
        "<span style='color:#b45309;font-weight:bold;'><i class='fa-solid fa-cubes-wood mr-1'></i> แปลงคดีไม้ผิดกฎหมาย</span>": timberLayerGroup,
        "<span style='color:#7c3aed;font-weight:bold;'><i class='fa-solid fa-paw mr-1'></i> จุดคดีสัตว์ป่า</span>": wildlifeLayerGroup,
        "<span style='color:#047857;font-weight:bold;'><i class='fa-solid fa-mountain mr-1'></i> แนวเขตป่าอนุรักษ์ / อุทยาน</span>": conservationForestLayer,
        "<span style='color:#ec4899;font-weight:bold;'><i class='fa-solid fa-tree mr-1'></i> แนวเขตป่าสงวนแห่งชาติ</span>": reserveForestLayer
      };
      layerControlInstance = L.control.layers(baseMaps, overlayMaps, { collapsed: false }).addTo(mapInstance);
      loadReferenceForestLayers();
    }

    function loadReferenceForestLayers() {
      fetch(URL_CONSERVATION_FOREST).then(r => r.ok ? r.json() : null).then(d => {
        if (!d) return;
        L.geoJSON(d, {
          style: { color: "#047857", weight: 1.5, fillColor: "#a7f3d0", fillOpacity: 0.25 },
          onEachFeature: (f, l) => {
            let n = f.properties.NAME_TH || f.properties.name || f.properties.NAM_T || 'ไม่ระบุ';
            l.bindPopup(`<b class='text-emerald-800 text-sm'>⛰️ เขตป่าอนุรักษ์/อุทยาน</b><br><span class='text-xs'>${n}</span>`);
          }
        }).addTo(conservationForestLayer);
      }).catch(()=>{});

      fetch(URL_RESERVE_FOREST).then(r => r.ok ? r.json() : null).then(d => {
        if (!d) return;
        L.geoJSON(d, {
          style: { color: "#db2777", weight: 1.5, fillColor: "#fbcfe8", fillOpacity: 0.25 },
          onEachFeature: (f, l) => {
            let n = f.properties.NAME_TH || f.properties.name || f.properties.NAM_T || 'ไม่ระบุ';
            l.bindPopup(`<b class='text-pink-800 text-sm'>🌳 เขตป่าสงวนแห่งชาติ</b><br><span class='text-xs'>${n}</span>`);
          }
        }).addTo(reserveForestLayer);
      }).catch(()=>{});
    }

    function clearAllMapLayers() {
      encroachmentLayerGroup.clearLayers();
      timberLayerGroup.clearLayers();
      wildlifeLayerGroup.clearLayers();
      window.mapLayersRegistry = {};
    }

    // ============================================================
    //  MODAL CONTROLS
    // ============================================================
    function openFormModal() {
      if (currentActiveTab === 'wildlife') {
        document.getElementById('wildlifeModal').style.display = 'flex';
        return;
      }
      document.getElementById('formModal').style.display = 'flex';
      if (currentActiveTab === 'encroachment') {
        document.getElementById('modalTitle').textContent = 'บันทึกคดีบุกรุกพื้นที่ป่า';
        document.getElementById('timberFieldsSection').classList.add('hidden');
        document.getElementById('areaFieldsSection').classList.remove('hidden');
      } else {
        document.getElementById('modalTitle').textContent = 'บันทึกคดีไม้ผิดกฎหมาย';
        document.getElementById('timberFieldsSection').classList.remove('hidden');
        document.getElementById('areaFieldsSection').classList.add('hidden');
      }
    }

    function closeFormModal() {
      document.getElementById('formModal').style.display = 'none';
      document.getElementById('unifiedForm').reset();
      document.getElementById('filenameDisplay').classList.add('hidden');
      document.getElementById('zipLabelText').classList.remove('hidden');
      document.getElementById('utm_result_main').classList.add('hidden');
      document.getElementById('utm_error_main').classList.add('hidden');
      if (previewMarker) { mapInstance.removeLayer(previewMarker); previewMarker = null; }
    }

    function closeWildlifeModal() {
      document.getElementById('wildlifeModal').style.display = 'none';
      document.getElementById('wildlifeForm').reset();
      document.getElementById('utm_result_wl').classList.add('hidden');
      document.getElementById('utm_error_wl').classList.add('hidden');
      if (previewMarker) { mapInstance.removeLayer(previewMarker); previewMarker = null; }
    }

    // ============================================================
    //  SHAPEFILE ANALYZE
    // ============================================================
    async function displaySelectedFilename() {
      const fileInput = document.getElementById('shpZipFile');
      const f = fileInput.files[0];
      if (!f) return;

      document.getElementById('filenameDisplay').innerHTML = `<i class="fa-solid fa-circle-notch fa-spin mr-1"></i> ระบบกำลังแกะอ่านค่าชั้นพิกัด GIS...`;
      document.getElementById('filenameDisplay').classList.remove('hidden');
      document.getElementById('zipLabelText').classList.add('hidden');

      const fd = new FormData();
      fd.append("file", f);

      try {
        const res = await fetch(`${API_BASE_URL}/analyze-shapefile/`, { method: "POST", body: fd });
        const result = await res.json();

        if (res.ok && result.success) {
          document.getElementById('filenameDisplay').textContent = "ตรวจสอบไฟล์แผนที่สำเร็จ: " + f.name;

          if (currentActiveTab === 'encroachment') {
            document.getElementById('rai').value = result.rai || 0;
            document.getElementById('ngarn').value = result.ngarn || 0;
            document.getElementById('wa').value = result.wa || 0;
          }

          // auto fill lat/lon จาก shapefile ลง hidden field
          document.getElementById('converted_lat').value = result.lat;
          document.getElementById('converted_lon').value = result.lon;

          if (previewMarker) { mapInstance.removeLayer(previewMarker); }
          previewMarker = L.marker([result.lat, result.lon]).addTo(mapInstance)
            .bindPopup(`<b class="text-emerald-700">📍 จุดพิกัดศูนย์กลางแปลงคดี</b><br><span class="text-xs">จากการถอดรหัสไฟล์ Shapefile ชั่วคราว</span>`)
            .openPopup();

          document.getElementById('map').scrollIntoView({ behavior: 'smooth', block: 'center' });
          mapInstance.setView([result.lat, result.lon], 14);
        } else {
          document.getElementById('filenameDisplay').textContent = "เลือกไฟล์แล้ว: " + f.name;
        }
      } catch (err) {
        document.getElementById('filenameDisplay').textContent = "เลือกไฟล์แล้ว: " + f.name;
      }
    }

    // ============================================================
    //  SWITCH TAB
    // ============================================================
    function switchTab(mode) {
      currentActiveTab = mode;
      document.getElementById('tab-enc').className = 'pb-2 font-bold text-lg text-gray-400 hover:text-emerald-600';
      document.getElementById('tab-timber').className = 'pb-2 font-bold text-lg text-gray-400 hover:text-emerald-600';
      document.getElementById('tab-wildlife').className = 'pb-2 font-bold text-lg text-gray-400 hover:text-violet-600 tab-wildlife';

      if (mode === 'encroachment') {
        document.getElementById('tab-enc').className = 'pb-2 font-bold text-lg nav-active';
        document.getElementById('addCaseBtn').innerHTML = '<i class="fa-solid fa-cloud-arrow-up mr-2 text-lg"></i> บันทึกคดีใหม่ด้วย Shapefile (.zip)';
        document.getElementById('addCaseBtn').className = 'bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-6 py-3 rounded-xl shadow-md transition flex items-center';
      } else if (mode === 'timber') {
        document.getElementById('tab-timber').className = 'pb-2 font-bold text-lg nav-active';
        document.getElementById('addCaseBtn').innerHTML = '<i class="fa-solid fa-cloud-arrow-up mr-2 text-lg"></i> บันทึกคดีใหม่ด้วย Shapefile (.zip)';
        document.getElementById('addCaseBtn').className = 'bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-6 py-3 rounded-xl shadow-md transition flex items-center';
      } else if (mode === 'wildlife') {
        document.getElementById('tab-wildlife').className = 'pb-2 font-bold text-lg nav-active tab-wildlife';
        document.getElementById('addCaseBtn').innerHTML = '<i class="fa-solid fa-paw mr-2 text-lg"></i> บันทึกคดีสัตว์ป่าใหม่';
        document.getElementById('addCaseBtn').className = 'bg-violet-600 hover:bg-violet-700 text-white font-semibold px-6 py-3 rounded-xl shadow-md transition flex items-center';
      }
      loadTableData();
    }

    // ============================================================
    //  LOAD TABLE DATA
    // ============================================================
    async function loadTableData() {
      const headerRow = document.getElementById('table-header-row');
      const bodyRow = document.getElementById('table-body-row');
      bodyRow.innerHTML = '<tr><td class="p-12 text-center text-gray-400" colspan="20"><i class="fa-solid fa-circle-notch fa-spin text-xl text-emerald-600 mr-2"></i> กำลังอัปเดตข้อมูลจากระบบหลังบ้าน Supabase...</td></tr>';
      clearAllMapLayers();

      if (currentActiveTab === 'encroachment') {
        headerRow.innerHTML = `<th class="p-4">ลำดับ</th><th class="p-4">เลขคดี</th><th class="p-4">วันเกิดเหตุ</th><th class="p-4">สถานที่เกิดเหตุ</th><th class="p-2 text-center">ไร่</th><th class="p-2 text-center">งาน</th><th class="p-2 text-center">ตร.ว.</th><th class="p-2 text-center">ผู้ต้องหา(ราย)</th><th class="p-3 text-center">คดีสิ้นสุด</th><th class="p-3 text-center">อยู่ระหว่างคดี</th><th class="p-4">สถานะคดีความคืบหน้า</th><th class="p-4 min-w-[160px]">พิกัดเกิดเหตุ</th><th class="p-4 text-center">เอกสาร PDF</th><th class="p-4 text-center">จัดการ</th>`;
      } else if (currentActiveTab === 'timber') {
        headerRow.innerHTML = `<th class="p-4">ลำดับ</th><th class="p-4">เลขคดี</th><th class="p-4">วันเกิดเหตุ</th><th class="p-4">สถานที่เกิดเหตุ</th><th class="p-4">ชนิดไม้</th><th class="p-2 text-center">กว้าง</th><th class="p-2 text-center">ยาว</th><th class="p-2 text-center">โต</th><th class="p-2 text-center">ท่อน (ลบ.ม.)</th><th class="p-2 text-center">แปรรูป (ลบ.ม)</th><th class="p-2 text-center">ผู้ต้องหา(ราย)</th><th class="p-3 text-center">คดีสิ้นสุด</th><th class="p-3 text-center">อยู่ระหว่างคดี</th><th class="p-4">สถานะคดีความคืบหน้า</th><th class="p-4 min-w-[160px]">พิกัดเกิดเหตุ</th><th class="p-4 text-center">เอกสาร PDF</th><th class="p-4 text-center">จัดการ</th>`;
      } else if (currentActiveTab === 'wildlife') {
        headerRow.innerHTML = `<th class="p-4">ลำดับ</th><th class="p-4">เลขคดี</th><th class="p-4">วันเกิดเหตุ</th><th class="p-4">สถานที่เกิดเหตุ</th><th class="p-4">ชนิดสัตว์ป่า</th><th class="p-4">อุปกรณ์กระทำผิด</th><th class="p-2 text-center">ผู้ต้องหา(ราย)</th><th class="p-3 text-center">คดีสิ้นสุด</th><th class="p-3 text-center">อยู่ระหว่างคดี</th><th class="p-4">สถานะคดีความคืบหน้า</th><th class="p-4 min-w-[160px]">พิกัดเกิดเหตุ</th><th class="p-4 text-center">เอกสาร PDF</th><th class="p-4 text-center">จัดการ</th>`;
      }

      try {
        const res = await fetch(`${API_BASE_URL}/get-cases/${currentActiveTab}`);
        const data = await res.json();
        renderGrid(data);
      } catch (err) {
        document.getElementById('table-body-row').innerHTML = '<tr><td class="p-4 text-red-500" colspan="20">ไม่สามารถเชื่อมต่อดึงข้อมูลจากระบบ API ส่วนกลางได้</td></tr>';
      }
    }

    function getCaseStyle(locationText, isFinished) {
      let text = locationText || '';
      let fillColor = "#f59e0b";
      if (text.includes("อุทยาน") || text.includes("อนุรักษ์") || text.includes("สัตว์ป่า") || text.includes("เตรียมการ")) fillColor = "#065f46";
      else if (text.includes("ป่าสงวน") || text.includes("แห่งชาติ")) fillColor = "#b11226";
      return { color: isFinished ? "#10b981" : "#ef4444", weight: 3.5, fillColor, fillOpacity: 0.6 };
    }

    // ============================================================
    //  RENDER GRID
    // ============================================================
    function renderGrid(data) {
      const bodyRow = document.getElementById('table-body-row');
      if (!data || data.length === 0) {
        bodyRow.innerHTML = '<tr><td class="p-8 text-center text-gray-400" colspan="20">ไม่พบสารบบบันทึกคดีในระบบคลาวด์ขณะนี้</td></tr>';
        return;
      }

      let targetLayerGroup = currentActiveTab === 'encroachment' ? encroachmentLayerGroup
                           : currentActiveTab === 'timber' ? timberLayerGroup
                           : wildlifeLayerGroup;

      bodyRow.innerHTML = data.map((item, idx) => {
        const uniqueKey = currentActiveTab + "_" + item.id;
        const rowNum = idx + 1;

        // — wildlife markers —
        if (currentActiveTab === 'wildlife' && item.coords && Array.isArray(item.coords) && item.coords.length === 2) {
          let lat = item.coords[0], lon = item.coords[1];
          if (lat !== 0 || lon !== 0) {
            let wlMarker = L.circleMarker([lat, lon], {
              radius: 8, color: item.is_finished ? "#10b981" : "#7c3aed",
              fillColor: "#7c3aed", fillOpacity: 0.75, weight: 2.5
            }).addTo(wildlifeLayerGroup).bindPopup(
              `<div class='p-1'><b class='text-violet-700 text-sm'>🐾 เลขคดี: ${item.case_no}</b><br>
              <span class='text-xs text-gray-600'>
                <b>พื้นที่เหตุ:</b> ${item.location}<br>
                <b>ชนิดสัตว์ป่า:</b> ${item.wildlife_type || '-'}<br>
                <b>อุปกรณ์:</b> ${item.equipment || '-'}<br>
                <b>ผู้ต้องหา:</b> ${item.suspects_count} ราย<br>
                ${item.utm_e ? `<b>UTM:</b> Z${item.utm_zone||47}N E:${item.utm_e} N:${item.utm_n}<br>` : ''}
                <b>WGS84:</b> ${lat.toFixed(5)}, ${lon.toFixed(5)}
              </span></div>`
            );
            window.mapLayersRegistry[uniqueKey] = wlMarker;
          }
        }

        // — encroachment / timber GeoJSON —
        if ((currentActiveTab === 'encroachment' || currentActiveTab === 'timber') && item.geojson_data) {
          let currentStyle = getCaseStyle(item.location, item.is_finished);
          const popupContent = `<div class='p-1'><b class='text-emerald-700 text-sm'>เลขคดี: ${item.case_no}</b><br>
            <span class='text-xs text-gray-600'>
              <b>พื้นที่เหตุ:</b> ${item.location}<br>
              <b>ผู้ต้องหา:</b> ${item.suspects_count} ราย<br>
              ${item.utm_e ? `<b>UTM:</b> Z${item.utm_zone||47}N E:${item.utm_e} N:${item.utm_n}<br>` : ''}
              <b>สถานะคดี:</b> ${item.case_status}
            </span></div>`;

          if (typeof item.geojson_data === 'string' && item.geojson_data.startsWith('http')) {
            fetch(item.geojson_data).then(r => r.json()).then(gd => {
              let ml = L.geoJSON(gd, { style: currentStyle, onEachFeature: (f, l) => l.bindPopup(popupContent) }).addTo(targetLayerGroup);
              window.mapLayersRegistry[uniqueKey] = ml;
            }).catch(() => {});
          } else {
            try {
              let pg = typeof item.geojson_data === 'string' ? JSON.parse(item.geojson_data) : item.geojson_data;
              let ml = L.geoJSON(pg, { style: currentStyle, onEachFeature: (f, l) => l.bindPopup(popupContent) }).addTo(targetLayerGroup);
              window.mapLayersRegistry[uniqueKey] = ml;
            } catch (e) {}
          }
        }

        let rawStatusText = item.case_status || '-';
        let truncatedStatus = rawStatusText.length > 40 ? rawStatusText.substring(0, 40) + '...' : rawStatusText;
        let pdfBtn = item.pdf_url ? `<a href="${item.pdf_url}" target="_blank" class="text-red-500 hover:text-red-700 text-lg"><i class="fa-solid fa-file-pdf"></i></a>` : `<span class="text-gray-300">-</span>`;
        let coordsHtml = fmtCoords(item);

        let zoomBtn = `<button onclick="zoomToCaseLayer('${uniqueKey}')" class="bg-slate-100 hover:bg-emerald-600 hover:text-white text-xs px-2 py-1 rounded-md whitespace-nowrap"><i class="fa-solid fa-location-dot ${currentActiveTab === 'wildlife' ? 'text-violet-600' : 'text-emerald-600'}"></i> ส่อง</button>`;

        if (currentActiveTab === 'wildlife') {
          return `<tr class="hover:bg-violet-50/30 border-b">
            <td class="p-4 text-center text-gray-500">${rowNum}</td>
            <td class="p-4 font-bold text-violet-800">${item.case_no}</td>
            <td class="p-4">${item.case_date}</td>
            <td class="p-4 truncate max-w-xs">${item.location}</td>
            <td class="p-4 font-semibold text-violet-700">${item.wildlife_type || '-'}</td>
            <td class="p-4 text-sm text-gray-600">${item.equipment || '-'}</td>
            <td class="p-2 text-center font-semibold text-slate-800 bg-slate-50">${item.suspects_count}</td>
            <td class="p-3 text-center text-green-600 font-bold">${item.is_finished ? '✓' : ''}</td>
            <td class="p-3 text-center text-amber-600 font-bold">${!item.is_finished ? '✓' : ''}</td>
            <td class="p-4 text-xs text-slate-600" title="${rawStatusText}">${truncatedStatus}</td>
            <td class="p-3">${coordsHtml}${zoomBtn}</td>
            <td class="p-4 text-center">${pdfBtn}</td>
            <td class="p-4 text-center">
              <button onclick="deleteCase('${item.case_no}')" class="text-red-400 hover:text-red-600" title="ลบคดี"><i class="fa-solid fa-trash-can"></i></button>
            </td>
          </tr>`;
        }

        let dlBtn = item.geojson_data && item.geojson_data.startsWith('http')
          ? `<button onclick="downloadShapefile('${item.geojson_data}','${item.case_no}')" title="ดาวน์โหลดพิกัด (.json)" class="text-emerald-600 hover:text-emerald-800"><i class="fa-solid fa-file-arrow-down"></i></button>`
          : `<span class="text-gray-300">-</span>`;

        if (currentActiveTab === 'encroachment') {
          return `<tr class="hover:bg-emerald-50/30 border-b">
            <td class="p-4 text-center text-gray-500">${rowNum}</td>
            <td class="p-4 font-bold text-emerald-800">${item.case_no}</td>
            <td class="p-4">${item.case_date}</td>
            <td class="p-4 truncate max-w-xs">${item.location}</td>
            <td class="p-2 text-center text-amber-800 font-bold">${item.rai || 0}</td>
            <td class="p-2 text-center">${item.ngarn || 0}</td>
            <td class="p-2 text-center">${item.wa || 0}</td>
            <td class="p-2 text-center font-semibold text-slate-800 bg-slate-50">${item.suspects_count}</td>
            <td class="p-3 text-center text-green-600 font-bold">${item.is_finished ? '✓' : ''}</td>
            <td class="p-3 text-center text-amber-600 font-bold">${!item.is_finished ? '✓' : ''}</td>
            <td class="p-4 text-xs text-slate-600" title="${rawStatusText}">${truncatedStatus}</td>
            <td class="p-3">${coordsHtml}${zoomBtn}</td>
            <td class="p-4 text-center">${pdfBtn}</td>
            <td class="p-4 text-center flex items-center justify-center space-x-3 mt-1.5">${dlBtn}<button onclick="deleteCase('${item.case_no}')" class="text-red-400 hover:text-red-600"><i class="fa-solid fa-trash-can"></i></button></td>
          </tr>`;
        } else {
          return `<tr class="hover:bg-amber-50/30 border-b">
            <td class="p-4 text-center text-gray-500">${rowNum}</td>
            <td class="p-4 font-bold text-emerald-800">${item.case_no}</td>
            <td class="p-4">${item.case_date}</td>
            <td class="p-4 truncate max-w-xs">${item.location}</td>
            <td class="p-4 font-semibold">${item.timber_type || '-'}</td>
            <td class="p-2 text-center">${item.width || '-'}</td>
            <td class="p-2 text-center">${item.length || '-'}</td>
            <td class="p-2 text-center">${item.size || '-'}</td>
            <td class="p-2 text-center text-blue-800 font-bold">${item.vol_logs || 0}</td>
            <td class="p-2 text-center text-teal-800 font-bold">${item.vol_processed || 0}</td>
            <td class="p-2 text-center font-semibold text-slate-800 bg-slate-50">${item.suspects_count}</td>
            <td class="p-3 text-center text-green-600 font-bold">${item.is_finished ? '✓' : ''}</td>
            <td class="p-3 text-center text-amber-600 font-bold">${!item.is_finished ? '✓' : ''}</td>
            <td class="p-4 text-xs text-slate-600" title="${rawStatusText}">${truncatedStatus}</td>
            <td class="p-3">${coordsHtml}${zoomBtn}</td>
            <td class="p-4 text-center">${pdfBtn}</td>
            <td class="p-4 text-center flex items-center justify-center space-x-3 mt-1.5">${dlBtn}<button onclick="deleteCase('${item.case_no}')" class="text-red-400 hover:text-red-600"><i class="fa-solid fa-trash-can"></i></button></td>
          </tr>`;
        }
      }).join('');
    }

    async function downloadShapefile(fileUrl, caseNo) {
      if (!fileUrl) return;
      const safe = caseNo.replace(/\//g, "-");
      try {
        const r = await fetch(fileUrl);
        const gd = await r.json();
        const a = document.createElement('a');
        a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(gd, null, 2));
        a.download = `คดีที่_${safe}_พิกัดแปลงที่ดิน.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
      } catch (e) { window.open(fileUrl, '_blank'); }
    }

    function zoomToCaseLayer(k) {
      if (window.mapLayersRegistry && window.mapLayersRegistry[k]) {
        let l = window.mapLayersRegistry[k];
        document.getElementById('map').scrollIntoView({ behavior: 'smooth', block: 'center' });
        if (k.startsWith('encroachment')) mapInstance.addLayer(encroachmentLayerGroup);
        else if (k.startsWith('timber')) mapInstance.addLayer(timberLayerGroup);
        else if (k.startsWith('wildlife')) mapInstance.addLayer(wildlifeLayerGroup);
        if (l.getBounds) mapInstance.fitBounds(l.getBounds(), { maxZoom: 16 });
        else mapInstance.setView(l.getLatLng(), 15);
        setTimeout(() => l.openPopup(), 600);
      } else {
        alert("แปลงพิกัดคดีกำลังเรนเดอร์ลงแผนที่หลัก กรุณาลองกดปุ่มส่องอีกครั้งใน 1 วินาทีครับ");
      }
    }

    // ============================================================
    //  SUBMIT: คดีบุกรุก + คดีไม้
    // ============================================================
    document.getElementById('unifiedForm').onsubmit = async function (e) {
      e.preventDefault();
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = `<i class="fa-solid fa-microchip fa-spin mr-1"></i> ระบบกำลังวิเคราะห์และแปลงค่า GIS...`;

      const fd = new FormData();
      fd.append("case_type", currentActiveTab);
      fd.append("case_no", document.getElementById('caseNo').value);
      fd.append("case_date", document.getElementById('caseDate').value);
      fd.append("location", document.getElementById('location').value);
      fd.append("status", document.getElementById('status').value);
      fd.append("case_status", document.getElementById('caseStatus').value);
      fd.append("agency", document.getElementById('agency').value);
      fd.append("suspects_count", document.getElementById('suspectsCount').value);
      fd.append("file", document.getElementById('shpZipFile').files[0]);

      // ส่ง UTM fields
      fd.append("utm_zone", document.getElementById('utm_zone').value || "47");
      fd.append("utm_e", document.getElementById('utm_e').value || "0");
      fd.append("utm_n", document.getElementById('utm_n').value || "0");

      const pdfFile = document.getElementById('pdfFile').files[0];
      if (pdfFile) fd.append("pdf_file", pdfFile);

      if (currentActiveTab === 'encroachment') {
        fd.append("rai", document.getElementById('rai').value);
        fd.append("ngarn", document.getElementById('ngarn').value);
        fd.append("wa", document.getElementById('wa').value);
      } else if (currentActiveTab === 'timber') {
        fd.append("timber_type", document.getElementById('timberType').value);
        fd.append("width", document.getElementById('width').value);
        fd.append("length", document.getElementById('length').value);
        fd.append("size", document.getElementById('size').value);
        fd.append("vol1", document.getElementById('vol1').value);
        fd.append("vol2", document.getElementById('vol2').value);
      }

      try {
        const res = await fetch(`${API_BASE_URL}/process-shapefile/`, { method: "POST", body: fd });
        const result = await res.json();
        if (res.ok && result.success) {
          alert("🎉 บันทึกพิกัดและข้อมูลสารบบคดีลง Supabase สำเร็จแล้ว");
          closeFormModal(); loadTableData();
        } else {
          alert("เกิดข้อผิดพลาดจากเซิร์ฟเวอร์: " + (result.error || result.detail || JSON.stringify(result)));
        }
      } catch (err) {
        alert("ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้: " + err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = "ส่งประมวลผลขึ้นคลาวด์";
      }
    };

    // ============================================================
    //  SUBMIT: คดีสัตว์ป่า
    // ============================================================
    document.getElementById('wildlifeForm').onsubmit = async function (e) {
      e.preventDefault();
      const submitBtn = document.getElementById('wl_submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin mr-1"></i> กำลังบันทึกข้อมูล...`;

      // ถ้ากรอก UTM แต่ยังไม่ได้แปลง → แปลงก่อน
      const utmE = document.getElementById('wl_utm_e').value;
      const utmN = document.getElementById('wl_utm_n').value;
      if (utmE && utmN && !document.getElementById('wl_converted_lat').value) {
        convertUTM('wl');
      }

      // lat/lon: ใช้จาก UTM converted ก่อน ถ้าไม่มีค่อยใช้ WGS84 field
      let finalLat = document.getElementById('wl_converted_lat').value || document.getElementById('wl_lat').value || "0";
      let finalLon = document.getElementById('wl_converted_lon').value || document.getElementById('wl_lon').value || "0";

      const fd = new FormData();
      fd.append("case_no", document.getElementById('wl_caseNo').value);
      fd.append("case_date", document.getElementById('wl_caseDate').value);
      fd.append("location", document.getElementById('wl_location').value);
      fd.append("status", document.getElementById('wl_status').value);
      fd.append("case_status", document.getElementById('wl_caseStatus').value);
      fd.append("agency", document.getElementById('wl_agency').value);
      fd.append("suspects_count", document.getElementById('wl_suspectsCount').value);
      fd.append("wildlife_type", document.getElementById('wl_wildlifeType').value);
      fd.append("equipment", document.getElementById('wl_equipment').value);
      fd.append("coords_lat", finalLat);
      fd.append("coords_lon", finalLon);
      fd.append("utm_zone", document.getElementById('wl_utm_zone').value || "47");
      fd.append("utm_e", utmE || "0");
      fd.append("utm_n", utmN || "0");

      const pdfFile = document.getElementById('wl_pdfFile').files[0];
      if (pdfFile) fd.append("pdf_file", pdfFile);

      try {
        const res = await fetch(`${API_BASE_URL}/process-wildlife/`, { method: "POST", body: fd });
        const result = await res.json();
        if (res.ok && result.success) {
          alert("🐾 บันทึกข้อมูลคดีสัตว์ป่าสำเร็จแล้ว");
          closeWildlifeModal(); loadTableData();
        } else {
          alert("เกิดข้อผิดพลาด: " + (result.error || result.detail || JSON.stringify(result)));
        }
      } catch (err) {
        alert("ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้: " + err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fa-solid fa-floppy-disk mr-1"></i> บันทึกคดีสัตว์ป่า';
      }
    };

    async function deleteCase(cNo) {
      if (confirm(`คุณต้องการลบพิกัดและข้อมูลคดีเลขที่ ${cNo} ออกจากฐานข้อมูลถาวรใช่หรือไม่?`)) {
        try {
          const res = await fetch(`${API_BASE_URL}/delete-case/${currentActiveTab}/${cNo}`, { method: "DELETE" });
          const result = await res.json();
          alert(result.message); loadTableData();
        } catch (e) { alert("เกิดข้อผิดพลาดในการสั่งลบข้อมูล"); }
      }
    }

    function filterDataGrid() {
      let q = document.getElementById("tableSearchInput").value.toLowerCase();
      let rows = document.getElementById("table-body-row").getElementsByTagName("tr");
      for (let i = 0; i < rows.length; i++) {
        rows[i].style.display = rows[i].textContent.toLowerCase().includes(q) ? "" : "none";
      }
    }

    window.onload = () => { setupMap(); switchTab('encroachment'); };
  </script>
</body>
</html>
