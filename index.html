<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ระบบสารบบคดีเชิงพื้นที่ - สบอ.13 ลำปาง</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
    .nav-active { border-bottom: 4px solid #059669; color: #059669; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <nav class="bg-gradient-to-r from-emerald-800 to-slate-900 text-white shadow-md px-6 py-3 flex justify-between items-center">
    <div class="flex items-center space-x-3">
      <div class="bg-white p-1 rounded-full shadow-sm flex items-center justify-center w-12 h-12 overflow-hidden">
        <img src="https://upload.wikimedia.org/wikipedia/th/7/7d/%E0%B8%95%E0%B8%A3%E0%B8%B2%E0%B8%81%E0%B8%A3%E0%B8%A1%E0%B8%AD%E0%B8%B8%E0%B8%97%E0%B8%A2%E0%B8%B2%E0%B8%99%E0%B9%81%E0%B8%AB%E0%B9%88%E0%B8%87%E0%B8%8A%E0%B8%B2%E0%B8%95%E0%B8%B4_%E0%B8%AA%E0%B8%B1%E0%B8%95%E0%B8%A7%E0%B9%8C%E0%B8%9B%E0%B9%88%E0%B8%B2_%E0%B9%81%E0%B8%A5%E0%B8%B0%E0%B8%9E%E0%B8%B1%E0%B8%99%E0%B8%98%E0%B8%B8%E0%B9%8C%E0%B8%9E%E0%B8%B7%E0%B8%8A.png">
      </div>
      <div>
        <h1 class="text-xl font-bold leading-none tracking-wide">DNP ระบบสารบบคดีเชิงพื้นที่ (Supabase)</h1>
        <p class="text-xs opacity-75 mt-1">สำนักบริหารพื้นที่อนุรักษ์ที่ 13 สาขาลำปาง</p>
      </div>
    </div>
    <span class="text-sm font-semibold italic hidden md:block text-emerald-100">Department of National Parks, Wildlife and Plant Conservation</span>
  </nav>

  <main class="max-w-7xl mx-auto p-4 md:p-8 w-full flex-1 flex flex-col">
    <div class="flex space-x-8 mb-6 bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
      <button onclick="switchTab('encroachment')" id="tab-enc" class="pb-2 font-bold text-lg nav-active"><i class="fa-solid fa-person-trespassing mr-2"></i> คดีบุกรุกพื้นที่ป่า</button>
      <button onclick="switchTab('timber')" id="tab-timber" class="pb-2 font-bold text-lg text-gray-400 hover:text-emerald-600"><i class="fa-solid fa-cubes-wood mr-2"></i> คดีไม้ผิดกฎหมาย</button>
    </div>

    <div class="bg-white rounded-2xl shadow-md overflow-hidden border border-gray-200 h-[380px] mb-6" id="map"></div>

    <div class="flex flex-col md:flex-row justify-between mb-6 gap-4">
      <button onclick="openFormModal()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-6 py-3 rounded-xl shadow-md transition flex items-center">
        <i class="fa-solid fa-cloud-arrow-up mr-2 text-lg"></i> บันทึกคดีใหม่ด้วย Shapefile (.zip)
      </button>
      <div class="relative">
        <input type="text" id="tableSearchInput" onkeyup="filterDataGrid()" placeholder="ค้นหาข้อมูลในสารบบ..." class="pl-10 pr-4 py-3 border border-gray-300 rounded-xl outline-none w-full md:w-96 shadow-sm focus:ring-2 focus:ring-emerald-500">
        <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-4 text-gray-400"></i>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-200">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse" id="dataGrid">
          <thead class="bg-gray-50 border-b border-gray-200"><tr id="table-header-row" class="text-emerald-900 text-sm font-bold"></tr></thead>
          <tbody id="table-body-row" class="text-gray-700 text-sm divide-y divide-gray-100">
            <tr><td class="p-12 text-center text-gray-400"><i class="fa-solid fa-circle-notch fa-spin text-2xl text-emerald-600 mr-2"></i> กำลังเชื่อมต่อฐานข้อมูล Supabase...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="formModal" style="z-index: 9999;" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden justify-center items-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-xl w-full max-h-[90vh] overflow-y-auto p-6">
      <div class="flex justify-between items-center border-b pb-3 mb-4">
        <h3 class="text-lg font-bold text-gray-800" id="modalTitle">นำเข้าข้อมูลคดี</h3>
        <button onclick="closeFormModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button>
      </div>
      
      <form id="unifiedForm" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-xs font-bold text-gray-600 mb-1">เลขคดีที่</label><input type="text" id="caseNo" required placeholder="เช่น 14/2569" class="w-full border p-2.5 rounded-lg outline-none"></div>
          <div><label class="block text-xs font-bold text-gray-600 mb-1">วัน/เดือน/ปี เกิดเหตุ</label><input type="text" id="caseDate" placeholder="เช่น 04/06/2569" required class="w-full border p-2.5 rounded-lg outline-none"></div>
        </div>
        <div><label class="block text-xs font-bold text-gray-600 mb-1">สถานที่เกิดเหตุ</label><input type="text" id="location" required placeholder="ระบุตําบล อำเภอ และชื่อป่า" class="w-full border p-2.5 rounded-lg outline-none"></div>
        
        <div id="timberFieldsSection" class="hidden space-y-4 bg-amber-50/50 p-3 rounded-xl border border-amber-200">
          <div class="grid grid-cols-2 gap-2">
            <div><label class="text-xs font-bold text-gray-600">ชนิดไม้</label><input type="text" id="timberType" class="w-full border p-2 rounded-lg bg-white"></div>
            <div class="grid grid-cols-3 gap-1">
              <div><label class="text-xs text-gray-500">กว้าง</label><input type="text" id="width" value="-" class="w-full border p-1 rounded-md text-center bg-white"></div>
              <div><label class="text-xs text-gray-500">ยาว</label><input type="text" id="length" value="-" class="w-full border p-1 rounded-md text-center bg-white"></div>
              <div><label class="text-xs text-gray-500">โต</label><input type="text" id="size" value="-" class="w-full border p-1 rounded-md text-center bg-white"></div>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-2">
            <div><label class="text-xs font-bold text-gray-600">ปริมาตรไม้ท่อน (ลบ.ม.)</label><input type="text" id="vol1" value="0" class="w-full border p-2 rounded-lg bg-white"></div>
            <div><label class="text-xs font-bold text-gray-600">ปริมาตรไม้แปรรูป (ลบ.ม)</label><input type="text" id="vol2" value="0" class="w-full border p-2 rounded-lg bg-white"></div>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-xs font-bold text-gray-600 mb-1">ผลการดำเนินคดี</label><select id="status" class="w-full border p-2.5 rounded-lg bg-white outline-none"><option>อยู่ระหว่างคดี</option><option>คดีสิ้นสุด</option></select></div>
          <div><label class="block text-xs font-bold text-gray-600 mb-1">หน่วยงานที่ดำเนินการ</label><input type="text" id="agency" required placeholder="เช่น สปป.3 (ภาคเหนือ)" class="w-full border p-2.5 rounded-lg outline-none"></div>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">จำนวนผู้ต้องหา (ราย)</label>
          <input type="number" id="suspectsCount" min="0" value="0" required class="w-full border p-2.5 rounded-lg outline-none">
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">สถานะคดี (ความคืบหน้าขั้นตอนดำเนินคดี)</label>
          <textarea id="caseStatus" rows="3" required placeholder="ตัวอย่าง: พนักงานสอบสวนได้ทำการรับคำร้องทุกข์ไว้ดำเนินการเรียบร้อยแล้ว อยู่ระหว่างเรียกสอบพยานพยานแวดล้อมเพิ่มเติมตามคำสั่งการของฝ่ายอัยการสูงสุด..." class="w-full border p-2.5 rounded-lg outline-none text-sm"></textarea>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">อัปโหลดไฟล์สแกนคำร้อง/คำพิพากษาคดี (PDF - ถ้ามี)</label>
          <input type="file" id="pdfFile" accept=".pdf" class="w-full border p-2 rounded-lg bg-slate-50 outline-none text-sm">
        </div>

        <div class="border-2 border-dashed border-emerald-300 bg-emerald-50/10 rounded-xl p-4 text-center relative group">
          <input type="file" id="shpZipFile" accept=".zip" required onchange="displaySelectedFilename()" class="absolute inset-0 opacity-0 cursor-pointer">
          <i class="fa-solid fa-file-zipper text-3xl text-emerald-600 mb-1"></i>
          <p class="text-sm font-bold text-gray-700" id="zipLabelText">เลือกไฟล์บีบอัดของ Shapefile (.zip)</p>
          <p class="text-xs text-amber-600 mt-1 font-semibold hidden" id="filenameDisplay"></p>
        </div>

        <div class="flex justify-end space-x-2 pt-4 border-t">
          <button type="button" onclick="closeFormModal()" class="px-4 py-2.5 border rounded-lg text-gray-500 hover:bg-gray-50">ยกเลิก</button>
          <button type="submit" id="submitBtn" class="px-5 py-2.5 bg-emerald-600 text-white rounded-lg font-semibold shadow-md hover:bg-emerald-700">ส่งประมวลผลขึ้นคลาวด์</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let currentActiveTab = 'encroachment';
    let mapInstance;
    let loadedMapLayers = []; 
    
    // ⚠️ เปลี่ยนลิงก์ด้านล่างนี้ให้ตรงกับที่อยู่เว็บแอป API ของคุณบน Render.com
    const API_BASE_URL = "https://dnp-lampang-api-2.onrender.com"; 

    function setupMap() {
      mapInstance = L.map('map').setView([18.29, 99.50], 9); 
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
    }

    function clearAllMapLayers() { loadedMapLayers.forEach(l => mapInstance.removeLayer(l)); loadedMapLayers = []; }
    function openFormModal() { document.getElementById('formModal').style.display = 'flex'; if (currentActiveTab === 'encroachment') { document.getElementById('modalTitle').textContent = 'บันทึกคดีบุกรุกพื้นที่ป่า'; document.getElementById('timberFieldsSection').classList.add('hidden'); } else { document.getElementById('modalTitle').textContent = 'บันทึกคดีไม้ผิดกฎหมาย'; document.getElementById('timberFieldsSection').classList.remove('hidden'); } }
    function closeFormModal() { document.getElementById('formModal').style.display = 'none'; document.getElementById('unifiedForm').reset(); document.getElementById('filenameDisplay').classList.add('hidden'); document.getElementById('zipLabelText').classList.remove('hidden'); }
    function displaySelectedFilename() { const f = document.getElementById('shpZipFile').files[0]; if(f) { document.getElementById('filenameDisplay').textContent = "เลือกไฟล์แล้ว: " + f.name; document.getElementById('filenameDisplay').classList.remove('hidden'); document.getElementById('zipLabelText').classList.add('hidden'); } }

    function switchTab(mode) {
      currentActiveTab = mode;
      document.getElementById('tab-enc').className = mode === 'encroachment' ? 'pb-2 font-bold text-lg nav-active' : 'pb-2 font-bold text-lg text-gray-400 hover:text-emerald-600';
      document.getElementById('tab-timber').className = mode === 'timber' ? 'pb-2 font-bold text-lg nav-active' : 'pb-2 font-bold text-lg text-gray-400 hover:text-emerald-600';
      loadTableData();
    }

    async function loadTableData() {
      const headerRow = document.getElementById('table-header-row');
      const bodyRow = document.getElementById('table-body-row');
      bodyRow.innerHTML = '<tr><td class="p-12 text-center text-gray-400"><i class="fa-solid fa-circle-notch fa-spin text-xl text-emerald-600 mr-2"></i> กำลังอัปเดตข้อมูลจากระบบหลังบ้าน Supabase...</td></tr>';
      clearAllMapLayers();

      if (currentActiveTab === 'encroachment') {
        headerRow.innerHTML = `<th class="p-4">เลขคดี</th><th class="p-4">วันเกิดเหตุ</th><th class="p-4">สถานที่เกิดเหตุ</th><th class="p-2 text-center">ไร่</th><th class="p-2 text-center">งาน</th><th class="p-2 text-center">ตร.ว.</th><th class="p-2 text-center">ผู้ต้องหา(ราย)</th><th class="p-3 text-center">คดีสิ้นสุด</th><th class="p-3 text-center">อยู่ระหว่างคดี</th><th class="p-4">สถานะคดีความคืบหน้า</th><th class="p-4">พิกัดแปลง</th><th class="p-4 text-center">เอกสาร PDF</th><th class="p-4 text-center">จัดการ</th>`;
      } else {
        headerRow.innerHTML = `<th class="p-4">เลขคดี</th><th class="p-4">วันเกิดเหตุ</th><th class="p-4">สถานที่เกิดเหตุ</th><th class="p-4">ชนิดไม้</th><th class="p-2 text-center">ท่อน (ลบ.ม.)</th><th class="p-2 text-center">แปรรูป (ลบ.ม)</th><th class="p-2 text-center">ผู้ต้องหา(ราย)</th><th class="p-3 text-center">คดีสิ้นสุด</th><th class="p-3 text-center">อยู่ระหว่างคดี</th><th class="p-4">สถานะคดีความคืบหน้า</th><th class="p-4">พิกัดหมุด</th><th class="p-4 text-center">เอกสาร PDF</th><th class="p-4 text-center">จัดการ</th>`;
      }

      try {
        const res = await fetch(`${API_BASE_URL}/get-cases/${currentActiveTab}`);
        const data = await res.json();
        renderGrid(data);
      } catch (err) { bodyRow.innerHTML = '<tr><td class="p-4 text-red-500">ไม่สามารถเชื่อมต่อดึงข้อมูลจากระบบ API ส่วนกลางได้</td></tr>'; }
    }

    function renderGrid(data) {
      const bodyRow = document.getElementById('table-body-row');
      if(!data || data.length === 0) { bodyRow.innerHTML = '<tr><td class="p-8 text-center text-gray-400">ไม่พบสารบบบันทึกคดีในระบบคลาวด์ขณะนี้</td></tr>'; return; }
      
      window.mapLayersRegistry = {};
      
      bodyRow.innerHTML = data.map((item, idx) => {
        const uniqueKey = currentActiveTab + "_" + item.id;

        // 💡 ปรับปรุงส่วนการดึงพิกัดแผนที่: รองรับทั้งก้อน Object (แบบเก่า) และ ลิงก์ URL ไฟล์ .json (แบบใหม่)
        if (item.geojson_data) {
          let bColor = item.is_finished ? "#10b981" : "#f97316";
          let fColor = (item.location || '').includes("อุทยาน") || (item.location || '').includes("อนุรักษ์") ? "#064e3b" : "#84cc16";
          
          // ตรวจสอบว่าเป็นลิงก์ URL ของระบบ Hybrid Storage หรือไม่
          if (typeof item.geojson_data === 'string' && item.geojson_data.startsWith('http')) {
            fetch(item.geojson_data)
              .then(response => response.json())
              .then(geojsonData => {
                let mapLayer = L.geoJSON(geojsonData, {
                  style: { color: bColor, weight: 3, fillColor: fColor, fillOpacity: 0.5 },
                  onEachFeature: (f, layer) => {
                    layer.bindPopup(`<div class='p-1'><b class='text-emerald-700 text-sm'>เลขคดี: ${item.case_no}</b><br><span class='text-xs text-gray-600'><b>ผู้ต้องหา:</b> ${item.suspects_count} ราย<br><b>สถานะคดี:</b> ${item.case_status}</span></div>`);
                  }
                }).addTo(mapInstance);
                loadedMapLayers.push(mapLayer);
                window.mapLayersRegistry[uniqueKey] = mapLayer;
                
                // สั่งจัดขนาดกล่องแผนที่ให้พอดีเมื่อโหลดครบทุกส่วน
                if (idx === data.length - 1 && loadedMapLayers.length > 0) {
                  let g = new L.featureGroup(loadedMapLayers);
                  mapInstance.fitBounds(g.getBounds(), {padding:[20,20]});
                }
              })
              .catch(e => console.error("โหลดไฟล์ GeoJSON ไม่สำเร็จ:", e));
          } else {
            // โหมดดึงข้อมูลกรณีเป็นคดีเก่าที่เป็น Object ก้อนฝังอยู่ในตาราง
            try {
              let parsedGeo = typeof item.geojson_data === 'string' ? JSON.parse(item.geojson_data) : item.geojson_data;
              let mapLayer = L.geoJSON(parsedGeo, {
                style: { color: bColor, weight: 3, fillColor: fColor, fillOpacity: 0.5 },
                onEachFeature: (f, layer) => {
                  layer.bindPopup(`<div class='p-1'><b class='text-emerald-700 text-sm'>เลขคดี: ${item.case_no}</b><br><span class='text-xs text-gray-600'><b>ผู้ต้องหา:</b> ${item.suspects_count} ราย<br><b>สถานะคดี:</b> ${item.case_status}</span></div>`);
                }
              }).addTo(mapInstance);
              loadedMapLayers.push(mapLayer);
              window.mapLayersRegistry[uniqueKey] = mapLayer;
            } catch(e){}
          }
        }

        // การจำกัดจำนวนตัวอักษรของสถานะคดีในตารางเหลือ 40 ตัวอักษรพร้อมแนบ Title Tooltip ยามเอาเมาส์ชี้ส่อง
        let rawStatusText = item.case_status || '-';
        let truncatedStatus = rawStatusText.length > 40 ? rawStatusText.substring(0, 40) + '...' : rawStatusText;

        // เช็กปุ่มดาวน์โหลดเอกสาร PDF (ถ้าไม่มีแสดงขีดแดชธรรมดา)
        let pdfButtonHtml = item.pdf_url ? `<a href="${item.pdf_url}" target="_blank" class="text-red-500 hover:text-red-700 text-lg"><i class="fa-solid fa-file-pdf"></i></a>` : `<span class="text-gray-300">-</span>`;

        if (currentActiveTab === 'encroachment') {
          return `<tr class="hover:bg-emerald-50/30 border-b">
            <td class="p-4 font-bold text-emerald-800">${item.case_no}</td>
            <td class="p-4">${item.case_date}</td>
            <td class="p-4 truncate max-w-xs">${item.location}</td>
            <td class="p-2 text-center text-amber-800 font-bold">${item.rai}</td>
            <td class="p-2 text-center">${item.ngarn}</td>
            <td class="p-2 text-center">${item.wa}</td>
            <td class="p-2 text-center font-semibold text-slate-800 bg-slate-50">${item.suspects_count}</td>
            <td class="p-3 text-center text-green-600 font-bold">${item.is_finished ? '✓':''}</td>
            <td class="p-3 text-center text-amber-600 font-bold">${!item.is_finished ? '✓':''}</td>
            <td class="p-4 text-xs text-slate-600" title="${rawStatusText}">${truncatedStatus}</td>
            <td class="p-4"><button onclick="zoomToCaseLayer('${uniqueKey}')" class="bg-slate-100 hover:bg-emerald-600 hover:text-white text-xs px-2 py-1 rounded-md"><i class="fa-solid fa-location-dot text-emerald-600"></i> ส่อง</button></td>
            <td class="p-4 text-center">${pdfButtonHtml}</td>
            <td class="p-4 text-center"><button onclick="deleteCase('${item.case_no}')" class="text-red-400 hover:text-red-600"><i class="fa-solid fa-trash-can"></i></button></td>
          </tr>`;
        } else {
          return `<tr class="hover:bg-amber-50/30 border-b">
            <td class="p-4 font-bold text-emerald-800">${item.case_no}</td>
            <td class="p-4">${item.case_date}</td>
            <td class="p-4 truncate max-w-xs">${item.location}</td>
            <td class="p-4 font-semibold">${item.timber_type}</td>
            <td class="p-2 text-center text-blue-800 font-bold">${item.vol_logs}</td>
            <td class="p-2 text-center text-teal-800 font-bold">${item.vol_processed}</td>
            <td class="p-2 text-center font-semibold text-slate-800 bg-slate-50">${item.suspects_count}</td>
            <td class="p-3 text-center text-green-600 font-bold">${item.is_finished ? '✓':''}</td>
            <td class="p-3 text-center text-amber-600 font-bold">${!item.is_finished ? '✓':''}</td>
            <td class="p-4 text-xs text-slate-600" title="${rawStatusText}">${truncatedStatus}</td>
            <td class="p-4"><button onclick="zoomToCaseLayer('${uniqueKey}')" class="bg-slate-100 hover:bg-amber-600 hover:text-white text-xs px-2 py-1 rounded-md"><i class="fa-solid fa-location-dot text-amber-600"></i> ส่อง</button></td>
            <td class="p-4 text-center">${pdfButtonHtml}</td>
            <td class="p-4 text-center"><button onclick="deleteCase('${item.case_no}')" class="text-red-400 hover:text-red-600"><i class="fa-solid fa-trash-can"></i></button></td>
          </tr>`;
        }
      }).join('');

      setTimeout(() => {
        if(loadedMapLayers.length > 0) { 
          let g = new L.featureGroup(loadedMapLayers); 
          mapInstance.fitBounds(g.getBounds(), {padding:[20,20]}); 
        }
      }, 500);
    }

    function zoomToCaseLayer(k) { 
      if(window.mapLayersRegistry && window.mapLayersRegistry[k]) { 
        let l = window.mapLayersRegistry[k]; 
        document.getElementById('map').scrollIntoView({behavior:'smooth', block:'center'}); 
        if(l.getBounds) { 
          mapInstance.fitBounds(l.getBounds(), {maxZoom:16}); 
        } else { 
          mapInstance.setView(l.getLatLng(),16); 
        } 
        setTimeout(()=> l.openPopup(), 600); 
      } else {
        alert("กำลังโหลดพิกัดแผนที่จากเซิร์ฟเวอร์คลาวด์ กรุณาลองกดส่องอีกครั้งใน 1-2 วินาทีครับ");
      }
    }

    document.getElementById('unifiedForm').onsubmit = async function(e) {
      e.preventDefault();
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = `<i class="fa-solid fa-microchip fa-spin mr-1"></i> เซิร์ฟเวอร์กำลังประมวลผลข้อมูล GIS...`;

      const fd = new FormData();
      fd.append("case_type", currentActiveTab);
      fd.append("case_no", document.getElementById('caseNo').value);
      fd.append("case_date", document.getElementById('caseDate').value);
      fd.append("location", document.getElementById('location').value);
      fd.append("status", document.getElementById('status').value);
      fd.append("case_status", document.getElementById('caseStatus').value);
      fd.append("agency", document.getElementById('agency').value);
      fd.append("suspects_count", document.getElementById('suspectsCount').value);
      fd.append("file", document.getElementById('shpZipFile').files[0]);
      
      const pdfFileInput = document.getElementById('pdfFile').files[0];
      if (pdfFileInput) { fd.append("pdf_file", pdfFileInput); }

      if (currentActiveTab === 'timber') {
        fd.append("timber_type", document.getElementById('timberType').value);
        fd.append("width", document.getElementById('width').value);
        fd.append("length", document.getElementById('length').value);
        fd.append("size", document.getElementById('size').value);
        fd.append("vol1", document.getElementById('vol1').value);
        fd.append("vol2", document.getElementById('vol2').value);
      }

      try {
        const res = await fetch(`${API_BASE_URL}/process-shapefile/`, { method: "POST", body: fd });
        const result = await res.json();
        if(result.success) { alert("🎉 ประมวลผลและเก็บบันทึกข้อมูลลงฐานข้อมูล Supabase สำเร็จแล้ว"); closeFormModal(); loadTableData(); } 
        else { alert("เกิดข้อผิดพลาด: " + result.detail); }
      } catch(err) { alert("ไม่สามารถติดต่อกับเซิร์ฟเวอร์หลักทางภูมิสารสนเทศได้"); } 
      finally { submitBtn.disabled = false; submitBtn.innerHTML = "ส่งประมวลผลขึ้นคลาวด์"; }
    };

    async function deleteCase(cNo) {
      if(confirm(`ยืนยันการลบข้อมูลคดีรหัสเลขที่ ${cNo} ออกจากฐานข้อมูลส่วนกลางถาวรหรือไม่?`)) {
        try {
          const res = await fetch(`${API_BASE_URL}/delete-case/${currentActiveTab}/${cNo}`, { method: "DELETE" });
          const result = await res.json();
          alert(result.message); loadTableData();
        } catch(e){ alert("เกิดข้อผิดพลาดในการสั่งลบข้อมูล"); }
      }
    }

    function filterDataGrid() { let q = document.getElementById("tableSearchInput").value.toLowerCase(); let rows = document.getElementById("table-body-row").getElementsByTagName("tr"); for(let i=0; i<rows.length; i++) { rows[i].style.display = rows[i].textContent.toLowerCase().includes(q) ? "" : "none"; } }

    window.onload = () => { setupMap(); switchTab('encroachment'); };
  </script>
</body>
</html>
