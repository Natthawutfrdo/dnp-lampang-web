<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบสารบบคดีเชิงพื้นที่ - สบอ.13 ลำปาง</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght=300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
    .nav-active { border-bottom: 4px solid #059669; color: #059669; }
    /* ปรับแต่งกล่องควบคุมแผนที่ให้สวยงามเข้ากับเว็บ */
    .leaflet-control-layers { font-family: 'Sarabun', sans-serif; border-radius: 12px !important; padding: 10px !important; border: none !important; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <nav class="bg-gradient-to-r from-emerald-800 to-slate-900 text-white shadow-md px-6 py-3 flex justify-between items-center">
    <div class="flex items-center space-x-3">
      <div class="bg-white p-1 rounded-full shadow-sm flex items-center justify-center w-12 h-12 overflow-hidden">
        <img src="https://upload.wikimedia.org/wikipedia/th/7/7d/%E0%B8%95%E0%B8%A3%E0%B8%B2%E0%B8%81%E0%B8%A3%E0%B8%A1%E0%B8%AD%E0%B8%B8%E0%B8%97%E0%B8%A2%E0%B8%B2%E0%B8%99%E0%B9%81%E0%B8%AB%E0%B9%88%E0%B8%87%E0%B8%8A%E0%B8%B2%E0%B8%95%E0%B8%B4_%E0%B8%AA%E0%B8%B1%E0%B8%95%E0%B8%A7%E0%B9%8C%E0%B8%9B%E0%B9%88%E0%B8%B2_%E0%B9%81%E0%B8%A5%E0%B8%B0%E0%B8%9E%E0%B8%B1%E0%B8%99%E0%B8%98%E0%B8%B8%E0%B9%8C%E0%B8%9E%E0%B8%B7%E0%B8%8A.png" alt="DNP Logo">
      </div>
      <div>
        <h1 class="text-xl font-bold leading-none tracking-wide">DNP ระบบสารบบคดีเชิงพื้นที่</h1>
        <p class="text-xs opacity-75 mt-1">สำนักบริหารพื้นที่อนุรักษ์ที่ 13 สาขาลำปาง</p>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto p-4 md:p-8 w-full flex-1 flex flex-col">
    <div class="flex space-x-8 mb-6 bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
      <button onclick="switchTab('encroachment')" id="tab-enc" class="pb-2 font-bold text-lg nav-active">
        <i class="fa-solid fa-person-trespassing mr-2"></i> คดีบุกรุกพื้นที่ป่า
      </button>
      <button onclick="switchTab('timber')" id="tab-timber" class="pb-2 font-bold text-lg text-gray-400 hover:text-emerald-600">
        <i class="fa-solid fa-cubes-wood mr-2"></i> คดีไม้ผิดกฎหมาย
      </button>
    </div>

    <div class="bg-white rounded-2xl shadow-md overflow-hidden border border-gray-200 h-[500px] mb-6" id="map"></div>

    <div class="flex flex-col md:flex-row justify-between mb-6 gap-4">
      <button onclick="openFormModal()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-6 py-3 rounded-xl shadow-md transition flex items-center">
        <i class="fa-solid fa-cloud-arrow-up mr-2 text-lg"></i> บันทึกคดีใหม่ด้วย Shapefile (.zip)
      </button>
      <div class="relative">
        <input type="text" id="tableSearchInput" onkeyup="filterDataGrid()" placeholder="ค้นหาข้อมูลในสารบบ..." class="pl-10 pr-4 py-3 border border-gray-300 rounded-xl outline-none w-full md:w-96 shadow-sm focus:ring-2 focus:ring-emerald-500">
        <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-4 text-gray-400"></i>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-200">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse" id="dataGrid">
          <thead class="bg-gray-50 border-b border-gray-200">
            <tr id="table-header-row" class="text-emerald-900 text-sm font-bold"></tr>
          </thead>
          <tbody id="table-body-row" class="text-gray-700 text-sm divide-y divide-gray-100">
            <tr>
              <td class="p-12 text-center text-gray-400">
                <i class="fa-solid fa-circle-notch fa-spin text-2xl text-emerald-600 mr-2"></i> กำลังเชื่อมต่อฐานข้อมูล...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="formModal" style="z-index: 9999;" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden justify-center items-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-xl w-full max-h-[90vh] overflow-y-auto p-6">
      <div class="flex justify-between items-center border-b pb-3 mb-4">
        <h3 class="text-lg font-bold text-gray-800" id="modalTitle">นำเข้าข้อมูลคดีด้วยไฟล์ผังแปลง</h3>
        <button onclick="closeFormModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button>
      </div>
      
      <form id="unifiedForm" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-xs font-bold text-gray-600 mb-1">เลขคดีที่</label><input type="text" id="caseNo" required placeholder="เช่น 14/2569" class="w-full border p-2.5 rounded-lg outline-none"></div>
          <div><label class="block text-xs font-bold text-gray-600 mb-1">วัน/เดือน/ปี เกิดเหตุ</label><input type="text" id="caseDate" placeholder="เช่น 04/06/2569" required class="w-full border p-2.5 rounded-lg outline-none"></div>
        </div>
        <div><label class="block text-xs font-bold text-gray-600 mb-1">สถานที่เกิดเหตุ</label><input type="text" id="location" required placeholder="ระบุตําบล อำเภอ และจังหวัด" class="w-full border p-2.5 rounded-lg outline-none"></div>
        
        <div id="timberFieldsSection" class="hidden space-y-4 bg-amber-50/50 p-3 rounded-xl border border-amber-200">
          <div class="grid grid-cols-2 gap-2">
            <div><label class="text-xs font-bold text-gray-600">ชนิดไม้</label><input type="text" id="timberType" class="w-full border p-2 rounded-lg bg-white"></div>
            <div class="grid grid-cols-3 gap-1">
              <div><label class="text-xs text-gray-500">กว้าง</label><input type="text" id="width" value="0" class="w-full border p-1 rounded-md text-center bg-white"></div>
              <div><label class="text-xs text-gray-500">ยาว</label><input type="text" id="length" value="0" class="w-full border p-1 rounded-md text-center bg-white"></div>
              <div><label class="text-xs text-gray-500">โต</label><input type="text" id="size" value="0" class="w-full border p-1 rounded-md text-center bg-white"></div>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-2">
            <div><label class="text-xs font-bold text-gray-600">ปริมาตรไม้ท่อน (ลบ.ม.)</label><input type="text" id="vol1" value="0" class="w-full border p-2 rounded-lg bg-white"></div>
            <div><label class="text-xs font-bold text-gray-600">ปริมาตรไม้แปรรูป (ลบ.ม)</label><input type="text" id="vol2" value="0" class="w-full border p-2 rounded-lg bg-white"></div>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-xs font-bold text-gray-600 mb-1">ผลการดำเนินคดี</label><select id="status" class="w-full border p-2.5 rounded-lg bg-white outline-none"><option>อยู่ระหว่างคดี</option><option>คดีสิ้นสุด</option></select></div>
          <div><label class="block text-xs font-bold text-gray-600 mb-1">หน่วยงานที่ดำเนินการ</label><input type="text" id="agency" required placeholder="เช่น สปป.3 (ภาคเหนือ)" class="w-full border p-2.5 rounded-lg outline-none"></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-xs font-bold text-gray-600 mb-1">จำนวนผู้ต้องหา (ราย)</label><input type="number" id="suspectsCount" min="0" value="0" required class="w-full border p-2.5 rounded-lg outline-none"></div>
          <div id="areaFieldsSection">
            <label class="block text-xs font-bold text-gray-600 mb-1">พื้นที่บุกรุกอัตโนมัติ (ไร่-งาน-ตร.ว.)</label>
            <div class="grid grid-cols-3 gap-1">
              <input type="number" id="rai" value="0" min="0" readonly class="border p-2 rounded-lg text-center bg-gray-50 font-bold text-emerald-800">
              <input type="number" id="ngarn" value="0" min="0" readonly class="border p-2 rounded-lg text-center bg-gray-50">
              <input type="number" id="wa" value="0" min="0" readonly class="border p-2 rounded-lg text-center bg-gray-50">
            </div>
          </div>
        </div>

        <div><label class="block text-xs font-bold text-gray-600 mb-1">สถานะคดี (ความคืบหน้า)</label><textarea id="caseStatus" rows="3" required placeholder="รายละเอียดขั้นตอนความคืบหน้า..." class="w-full border p-2.5 rounded-lg outline-none text-sm"></textarea></div>
        <div><label class="block text-xs font-bold text-gray-600 mb-1">อัปโหลดไฟล์เอกสารสำนวน PDF (ถ้ามี)</label><input type="file" id="pdfFile" accept=".pdf" class="w-full border p-2 rounded-lg bg-slate-50 text-sm"></div>

        <div class="border-2 border-dashed border-emerald-300 bg-emerald-50/10 rounded-xl p-4 text-center relative group">
          <input type="file" id="shpZipFile" accept=".zip" required onchange="displaySelectedFilename()" class="absolute inset-0 opacity-0 cursor-pointer">
          <i class="fa-solid fa-file-zipper text-3xl text-emerald-600 mb-1"></i>
          <p class="text-sm font-bold text-gray-700" id="zipLabelText">เลือกไฟล์บีบอัดของ Shapefile (.zip)</p>
          <p class="text-xs text-emerald-700 font-bold hidden" id="filenameDisplay"></p>
        </div>

        <div class="flex justify-end space-x-2 pt-4 border-t">
          <button type="button" onclick="closeFormModal()" class="px-4 py-2.5 border rounded-lg text-gray-500 hover:bg-gray-50">ยกเลิก</button>
          <button type="submit" id="submitBtn" class="px-5 py-2.5 bg-emerald-600 text-white rounded-lg font-semibold shadow-md hover:bg-emerald-700">ส่งประมวลผลขึ้นคลาวด์</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let currentActiveTab = 'encroachment';
    let mapInstance;
    let previewMarker = null;
    let layerControl; // กล่องสำหรับเปิด-ปิดชั้นข้อมูลบนแผนที่
    
    // --- 🌍 1. ประกาศตัวแปรกลุ่มข้อมูลแผ่นที่ (Layers Group) ---
    let nationalForestLayer = L.layerGroup();  // ป่าสงวนแห่งชาติ
    let protectedForestLayer = L.layerGroup(); // ป่าอนุรักษ์ (อุทยาน/รักษาพันธุ์สัตว์ป่า)
    let encroachmentCasesLayer = L.layerGroup(); // ชั้นข้อมูลหมุดคดีบุกรุก
    let timberCasesLayer = L.layerGroup();       // ชั้นข้อมูลหมุดคดีป่าไม้

    const API_BASE_URL = "https://dnp-lampang-api-2.onrender.com"; 

    // --- 🌍 2. ฟังก์ชันเริ่มระบบแผนที่และผูกชั้นข้อมูลพร้อมปุ่มเปิด-ปิด ---
    function setupMap() {
      // พิกัดศูนย์กลางจังหวัดลำปาง
      mapInstance = L.map('map').setView([18.29, 99.50], 9); 
      
      // แผนที่ฐาน (Base Map) จาก OpenStreetMap
      let osmBase = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
        attribution: '&copy; OpenStreetMap contributors' 
      }).addTo(mapInstance);

      // เปิดให้ชั้นข้อมูลเริ่มต้นแสดงผลบนหน้าจอทันที
      encroachmentCasesLayer.addTo(mapInstance);
      timberCasesLayer.addTo(mapInstance);

      // --- 💡 [ฟังก์ชันที่นำกลับมา] สร้างปุ่มตัวเลือกเปิด-ปิด ชั้นข้อมูล (Layers Control) ---
      let baseMaps = {
        "แผนที่เส้นทาง (OpenStreetMap)": osmBase
      };

      let overlayMaps = {
        "<span class='text-emerald-700 font-bold'>🌲 พื้นที่ป่าสงวนแห่งชาติ</span>": nationalForestLayer,
        "<span class='text-teal-700 font-bold'>🌳 พื้นที่ป่าอนุรักษ์ (สบอ.13)</span>": protectedForestLayer,
        "<span class='text-red-600 font-bold'>📍 หมุดคดีบุกรุกพื้นที่ป่า</span>": encroachmentCasesLayer,
        "<span class='text-amber-600 font-bold'>🪵 หมุดคดีป่าไม้/ไม้เถื่อน</span>": timberCasesLayer
      };

      layerControl = L.control.layers(baseMaps, overlayMaps, { collapsed: false }).addTo(mapInstance);

      // เรียกฟังก์ชันโหลดขอบเขตพื้นที่ป่าจำลองขึ้นแผนที่
      loadForestBoundaries();
      
      // ดึงข้อมูลหมุดคดีจาก Supabase มากระจายปักลงแผนที่
      fetchAllCasesToMap();
    }

    // --- 🌲 3. ฟังก์ชันโหลดเส้นแนวเขตป่าไม้จำลอง (สามารถเปลี่ยนตัวแปร URL ไปเป็นไฟล์ GeoJSON จริงของหน่วยงานได้เลยครับ) ---
    function loadForestBoundaries() {
      // จำลองพื้นที่ป่าสงวนในเขตลำปาง (วาดเป็น Polygon สีเขียว)
      L.polygon([
        [18.45, 99.35], [18.55, 99.35], [18.55, 99.55], [18.45, 99.55]
      ], { color: 'green', weight: 1, fillColor: '#22c55e', fillOpacity: 0.2 })
      .bindPopup("<b>🌲 เขตป่าสงวนแห่งชาติ (พื้นที่จำลองตรวจสอบ)</b>")
      .addTo(nationalForestLayer);

      // จำลองพื้นที่อุทยาน/ป่าอนุรักษ์ในเขตลำปาง (วาดเป็น Polygon สีฟ้าเขียว)
      L.polygon([
        [18.15, 99.40], [18.28, 99.40], [18.28, 99.60], [18.15, 99.60]
      ], { color: 'teal', weight: 1, fillColor: '#0d9488', fillOpacity: 0.25 })
      .bindPopup("<b>🌳 เขตป่าอนุรักษ์/อุทยานแห่งชาติ (สบอ.13 ลำปาง)</b>")
      .addTo(protectedForestLayer);
    }

    // --- 📍 4. ดึงข้อมูลพิกัดคดีทั้งหมดจากฐานข้อมูลมากระจายลงแผนที่พร้อมวาดแนวแปลงรูปปิด ---
    async function fetchAllCasesToMap() {
      encroachmentCasesLayer.clearLayers();
      timberCasesLayer.clearLayers();

      // ดึงข้อมูลฝั่งคดีบุกรุก
      try {
        const resEnc = await fetch(`${API_BASE_URL}/get-cases/encroachment`);
        const encData = await resEnc.json();
        encData.forEach(item => {
          if (item.coords && item.coords.length === 2) {
            // ปักหมุดวงกลมสีแดงสำหรับคดีบุกรุก
            let marker = L.circleMarker([item.coords[0], item.coords[1]], {
              radius: 8, fillColor: '#ef4444', color: '#b91c1c', weight: 2, fillOpacity: 0.8
            }).bindPopup(`
              <div class="text-sm font-sans">
                <b class="text-red-600">🔴 คดีบุกรุกพื้นที่ป่า</b><br>
                <b>เลขคดี:</b> ${item.case_no}<br>
                <b>สถานที่:</b> ${item.location}<br>
                <b>เนื้อที่:</b> ${item.rai} ไร่ ${item.ngarn} งาน ${item.wa} วา<br>
                <a href="${item.geojson_data}" target="_blank" class="text-blue-500 underline text-xs block mt-1">📥 ดาวน์โหลดโครงร่างพิกัด GeoJSON</a>
              </div>
            `);
            marker.addTo(encroachmentCasesLayer);
            
            // โหลดดึงผังแปลงจากถังเก็บมาวาดทับลงแผนที่จริงแบบ real-time
            if (item.geojson_data) {
              fetch(item.geojson_data).then(r => r.json()).then(geo => {
                L.geoJSON(geo, { style: { color: '#ef4444', weight: 2, fillOpacity: 0.1 } }).addTo(encroachmentCasesLayer);
              }).catch(e => console.log("ยังไม่มีไฟล์ผังแผนที่รูปปิด"));
            }
          }
        });
      } catch(e) { console.log("ดึงคดีบุกรุกลงแผนที่ติดขัด"); }

      // ดึงข้อมูลฝั่งคดีป่าไม้
      try {
        const resTimber = await fetch(`${API_BASE_URL}/get-cases/timber`);
        const timberData = await resTimber.json();
        timberData.forEach(item => {
          if (item.coords && item.coords.length === 2) {
            // ปักหมุดวงกลมสีส้มเหลืองสำหรับคดีป่าไม้
            let marker = L.circleMarker([item.coords[0], item.coords[1]], {
              radius: 8, fillColor: '#f59e0b', color: '#d97706', weight: 2, fillOpacity: 0.8
            }).bindPopup(`
              <div class="text-sm font-sans">
                <b class="text-amber-600">🪵 คดีไม้ผิดกฎหมาย</b><br>
                <b>เลขคดี:</b> ${item.case_no}<br>
                <b>ชนิดไม้:</b> ${item.timber_type || 'ไม่ระบุ'}<br>
                <b>ของกลาง:</b> ปริมาตร ${item.vol_logs || 0} ลบ.ม.<br>
                <b>สถานที่:</b> ${item.location}
              </div>
            `);
            marker.addTo(timberCasesLayer);
          }
        });
      } catch(e) { console.log("ดึงคดีไม้ลงแผนที่ติดขัด"); }
    }

    // --- 🛠️ 5. ฟังก์ชันบริหารจัดการระบบหน้าเว็บและแบบฟอร์ม ---
    function openFormModal() { 
      document.getElementById('formModal').style.display = 'flex'; 
      if (currentActiveTab === 'encroachment') { 
        document.getElementById('modalTitle').textContent = 'บันทึกคดีบุกรุกพื้นที่ป่าด้วย Shapefile'; 
        document.getElementById('timberFieldsSection').classList.add('hidden'); 
        document.getElementById('areaFieldsSection').classList.remove('hidden');
      } else { 
        document.getElementById('modalTitle').textContent = 'บันทึกคดีไม้ผิดกฎหมายด้วย Shapefile'; 
        document.getElementById('timberFieldsSection').classList.remove('hidden'); 
        document.getElementById('areaFieldsSection').classList.add('hidden');
      } 
    }
    
    function closeFormModal() { 
      document.getElementById('formModal').style.display = 'none'; 
      document.getElementById('unifiedForm').reset(); 
      document.getElementById('filenameDisplay').classList.add('hidden'); 
      document.getElementById('zipLabelText').classList.remove('hidden'); 
      if(previewMarker) { mapInstance.removeLayer(previewMarker); previewMarker = null; }
    }

    // ฟังก์ชันแรกในการดึงพิกัดมาพรีวิวก่อนบันทึกจริง
    async function displaySelectedFilename() { 
      const fileInput = document.getElementById('shpZipFile');
      const f = fileInput.files[0]; 
      if(!f) return;

      document.getElementById('filenameDisplay').innerHTML = `<i class="fa-solid fa-circle-notch fa-spin mr-1"></i> กำลังถอดรหัสพิกัดอัตโนมัติ...`;
      document.getElementById('filenameDisplay').classList.remove('hidden');
      document.getElementById('zipLabelText').classList.add('hidden');

      const fd = new FormData();
      fd.append("file", f);

      try {
        const res = await fetch(`${API_BASE_URL}/analyze-shapefile/`, { method: "POST", body: fd });
        const result = await res.json();

        if (res.ok && result.success) {
          document.getElementById('filenameDisplay').textContent = "ดึงพิกัดแผนที่สำเร็จ: " + f.name;
          
          if (currentActiveTab === 'encroachment') {
            document.getElementById('rai').value = result.rai;
            document.getElementById('ngarn').value = result.ngarn;
            document.getElementById('wa').value = result.wa;
          }

          if(previewMarker) { mapInstance.removeLayer(previewMarker); }
          previewMarker = L.marker([result.lat, result.lon]).addTo(mapInstance)
            .bindPopup(`<b class="text-emerald-700">📍 พิกัดศูนย์กลางคดีบุกรุก</b><br><span class="text-xs">จุดตรวจสอบเบื้องต้นจากแปลงในไฟล์ .zip</span>`)
            .openPopup();
          
          document.getElementById('map').scrollIntoView({behavior:'smooth', block:'center'}); 
          mapInstance.setView([result.lat, result.lon], 14);
        } else {
          alert("อ่านไฟล์พิกัดไม่สำเร็จ: " + (result.detail || "โครงสร้างไฟล์ .shp มีปัญหา"));
          closeFormModal();
        }
      } catch (err) {
        alert("ไม่สามารถเชื่อมต่อเส้นทางวิเคราะห์พิกัดแผนที่หลังบ้านได้");
        closeFormModal();
      }
    }

    function switchTab(mode) {
      currentActiveTab = mode;
      document.getElementById('tab-enc').className = mode === 'encroachment' ? 'pb-2 font-bold text-lg nav-active' : 'pb-2 font-bold text-lg text-gray-400 hover:text-emerald-600';
      document.getElementById('tab-timber').className = mode === 'timber' ? 'pb-2 font-bold text-lg nav-active' : 'pb-2 font-bold text-lg text-gray-400 hover:text-emerald-600';
      loadTableData();
    }

    async function loadTableData() {
      const bodyRow = document.getElementById('table-body-row');
      bodyRow.innerHTML = '<tr><td class="p-4 text-center text-gray-400"><i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังอัปเดตสารบบข้อมูล...</td></tr>';
      try {
        const res = await fetch(`${API_BASE_URL}/get-cases/${currentActiveTab}`);
        const data = await res.json();
        renderGrid(data);
      } catch (err) { 
        bodyRow.innerHTML = '<tr><td class="p-4 text-red-500 text-center">ไม่สามารถเชื่อมต่อเรียกข้อมูลจากเซิร์ฟเวอร์ปลายทางได้</td></tr>'; 
      }
    }

    function renderGrid(data) {
      const headerRow = document.getElementById('table-header-row');
      const bodyRow = document.getElementById('table-body-row');
      headerRow.innerHTML = `<th class="p-4">เลขคดี</th><th class="p-4">วันเกิดเหตุ</th><th class="p-4">สถานที่เกิดเหตุ</th><th class="p-4">สถานะคดี/ความคืบหน้า</th><th class="p-4 text-center">จัดการ</th>`;
      
      if(!data || data.length === 0) { bodyRow.innerHTML = '<tr><td class="p-8 text-center text-gray-400">ไม่พบข้อมูลในสารบบขณะนี้</td></tr>'; return; }
      bodyRow.innerHTML = data.map(item => `
        <tr class="border-b hover:bg-slate-50 transition">
          <td class="p-4 font-bold text-emerald-800">${item.case_no}</td>
          <td class="p-4">${item.case_date}</td>
          <td class="p-4">${item.location}</td>
          <td class="p-4 text-xs max-w-xs truncate" title="${item.case_status}">${item.case_status}</td>
          <td class="p-4 text-center">
            <button onclick="deleteCase('${item.case_no}')" class="text-red-400 hover:text-red-600 p-1 transition">
              <i class="fa-solid fa-trash-can"></i>
            </button>
          </td>
        </tr>
      `).join('');
    }

    // บันทึกข้อมูลคดีส่งขึ้นระบบเซิร์ฟเวอร์
    document.getElementById('unifiedForm').onsubmit = async function(e) {
      e.preventDefault();
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = `<i class="fa-solid fa-microchip fa-spin mr-1"></i> ระบบกำลังอัปโหลดและประมวลผลบนเซิร์ฟเวอร์...`;

      const fd = new FormData();
      fd.append("case_type", currentActiveTab);
      fd.append("case_no", document.getElementById('caseNo').value);
      fd.append("case_date", document.getElementById('caseDate').value);
      fd.append("location", document.getElementById('location').value);
      fd.append("status", document.getElementById('status').value);
      fd.append("case_status", document.getElementById('caseStatus').value);
      fd.append("agency", document.getElementById('agency').value);
      fd.append("suspects_count", document.getElementById('suspectsCount').value);
      fd.append("file", document.getElementById('shpZipFile').files[0]);
      
      if (document.getElementById('pdfFile').files[0]) { 
        fd.append("pdf_file", document.getElementById('pdfFile').files[0]); 
      }

      if (currentActiveTab === 'encroachment') {
        fd.append("rai", document.getElementById('rai').value);
        fd.append("ngarn", document.getElementById('ngarn').value);
        fd.append("wa", document.getElementById('wa').value);
      } else {
        fd.append("timber_type", document.getElementById('timberType').value);
        fd.append("width", document.getElementById('width').value);
        fd.append("length", document.getElementById('length').value);
        fd.append("size", document.getElementById('size').value);
        fd.append("vol1", document.getElementById('vol1').value);
        fd.append("vol2", document.getElementById('vol2').value);
      }

      try {
        const res = await fetch(`${API_BASE_URL}/process-shapefile/`, { method: "POST", body: fd });
        const result = await res.json();
        
        if (res.ok && result.success) { 
          alert("🎉 บันทึกคดีและจัดพิกัดลงถังเก็บข้อมูลเรียบร้อยแล้วครับ!"); 
          closeFormModal(); 
          loadTableData();
          fetchAllCasesToMap(); // สั่งรีเฟรชหมุดคดีบนแผนที่ให้ปรากฏทันที
        } else { 
          const errorMsg = result.error || result.detail || JSON.stringify(result);
          alert("เกิดข้อผิดพลาดจากเซิร์ฟเวอร์ฐานข้อมูล: " + errorMsg); 
        }
      } catch(err) { 
        alert("ไม่สามารถส่งข้อมูลหาเซิร์ฟเวอร์หลักได้สำเร็จ: " + err.message); 
      } finally { 
        submitBtn.disabled = false; 
        submitBtn.innerHTML = "ส่งประมวลผลขึ้นคลาวด์"; 
      }
    };

    function filterDataGrid() { 
      let q = document.getElementById("tableSearchInput").value.toLowerCase(); 
      let rows = document.getElementById("table-body-row").getElementsByTagName("tr"); 
      for(let i=0; i<rows.length; i++) { 
        if(rows[i].getElementsByTagName("td").length > 1) {
          rows[i].style.display = rows[i].textContent.toLowerCase().includes(q) ? "" : "none"; 
        }
      } 
    }

    async function deleteCase(cNo) { 
      if(confirm(`ยืนยันการลบข้อมูลคดีเลขที่คดีที่ ${cNo} ออกจากฐานข้อมูลถาวร?`)) { 
        try {
          const res = await fetch(`${API_BASE_URL}/delete-case/${currentActiveTab}/${cNo}`, { method: "DELETE" });
          if(res.ok) {
            alert("ลบข้อมูลสำเร็จ");
            loadTableData(); 
            fetchAllCasesToMap();
          } else { alert("ไม่สามารถสั่งลบข้อมูลได้"); }
        } catch(err) { alert("เกิดข้อผิดพลาดในการเชื่อมต่อเพื่อส่งคำสั่งลบ"); }
      } 
    }

    window.onload = () => { setupMap(); switchTab('encroachment'); };
  </script>
</body>
</html>
